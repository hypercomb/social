name: Azure Static Web Apps CI/CD (Development)

on:
  push:
    branches: [development]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node 22.12.0
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install workspace root dependencies
        working-directory: src
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Install essentials dependencies
        working-directory: src/hypercomb-essentials
        run: npm ci

      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build

      - name: Install web dependencies
        working-directory: src/hypercomb-web
        run: npm ci

      - name: Build web runtime assets
        working-directory: src/hypercomb-web
        run: npm run runtime

      - name: Link shared node_modules to web (prevents dual Angular runtime)
        working-directory: src
        run: |
          # Preserve esbuild — prebuild (build-pixi-vendor.ts) needs it after the link
          cp -r node_modules/esbuild hypercomb-web/node_modules/ 2>/dev/null || true
          cp -r "node_modules/@esbuild" hypercomb-web/node_modules/ 2>/dev/null || true
          rm -rf node_modules
          ln -s hypercomb-web/node_modules node_modules

      - name: Build web app
        working-directory: src/hypercomb-web
        run: npm run build

      - name: Verify build output
        run: ls -al src/hypercomb-web/dist/hypercomb-web/browser || true

      - name: Verify required web artifacts
        run: |
          set -euo pipefail
          ROOT="src/hypercomb-web/dist/hypercomb-web/browser"
          REQUIRED=(
            "index.html"
            "hypercomb.worker.js"
            "hypercomb-core.runtime.js"
            "local.png"
            "external.png"
            "house.png"
            "spw.png"
            "vendor/pixi.runtime.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "Missing required artifact: $ROOT/$f"
              exit 1
            fi
          done

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
          output_location: ""
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
