name: Azure Static Web Apps CI/CD (Development)

on:
  push:
    branches: [development]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node 22.12.0
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: |
            src/hypercomb-essentials/package-lock.json
            src/hypercomb-web/package-lock.json

      - name: Install essentials dependencies
        working-directory: src/hypercomb-essentials
        run: npm ci

      - name: Build and deploy essentials resources
        if: ${{ secrets.AZURE_CREDENTIALS_DEVELOPMENT != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEVELOPMENT }}

      - name: Publish essentials package + latest pointers
        if: ${{ secrets.AZURE_CREDENTIALS_DEVELOPMENT != '' }}
        shell: pwsh
        working-directory: src/hypercomb-essentials
        run: npm run build

      - name: Verify latest essentials pointer
        if: ${{ secrets.AZURE_CREDENTIALS_DEVELOPMENT != '' }}
        run: |
          set -euo pipefail
          SIG=$(curl -fsSL https://storagehypercomb.blob.core.windows.net/content/latest.txt | tr -d '\357\273\277' | tr -d '\r\n')
          echo "latest signature: $SIG"
          if ! echo "$SIG" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "Invalid latest signature: $SIG"
            exit 1
          fi
          curl -fsSI "https://storagehypercomb.blob.core.windows.net/content/$SIG/install.manifest.json" >/dev/null

      - name: Warn if essentials deploy skipped
        if: ${{ secrets.AZURE_CREDENTIALS_DEVELOPMENT == '' }}
        run: echo "AZURE_CREDENTIALS_DEVELOPMENT not set; essentials resources were not deployed."

      - name: Install web dependencies
        working-directory: src/hypercomb-web
        run: npm ci

      - name: Build web runtime assets
        working-directory: src/hypercomb-web
        run: npm run runtime

      - name: Build web app
        working-directory: src/hypercomb-web
        run: npm run build

      - name: Verify build output
        run: ls -al src/hypercomb-web/dist/hypercomb-web/browser || true

      - name: Verify required web artifacts
        run: |
          set -euo pipefail
          ROOT="src/hypercomb-web/dist/hypercomb-web/browser"
          REQUIRED=(
            "index.html"
            "hypercomb.worker.js"
            "hypercomb-core.runtime.js"
            "local.png"
            "external.png"
            "house.png"
            "spw.png"
            "vendor/pixi.runtime.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "Missing required artifact: $ROOT/$f"
              exit 1
            fi
          done

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/hypercomb-web/dist/hypercomb-web/browser