name: Azure Static Web Apps CI/CD (Development)

on:
  push:
    branches: [development]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node 24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          # Cache the npm download cache (~/.npm), keyed on the committed
          # lockfile. This skips network fetches during the workspace
          # `npm install` below WITHOUT changing the install itself — the
          # `rm -rf node_modules package-lock.json && npm install` step is
          # deliberate (npm 11 + workspace members break `npm ci`), so we
          # only accelerate the tarball fetches, not the resolution logic.
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      # Incremental build caches, persisted across runs. All three are
      # content-validated by their own tooling (the essentials Merkle cache
      # re-hashes file contents; Angular hashes inputs), so a stale restore
      # only triggers a rebuild of what changed — never wrong output. Keyed
      # per-commit with a prefix restore so each run warms the next.
      - name: Cache incremental build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/hypercomb-essentials/.build-cache.json
            src/hypercomb-essentials/dist/.cache
            src/hypercomb-web/.angular/cache
          key: hc-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            hc-build-${{ runner.os }}-

      - name: Install workspace root dependencies
        working-directory: src
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build

      - name: Build web runtime assets
        working-directory: src/hypercomb-web
        run: |
          node ./scripts/build-core-vendor.cjs
          node ../node_modules/tsx/dist/cli.mjs ./scripts/build-pixi-vendor.ts

      - name: Build web app
        working-directory: src/hypercomb-web
        # npm run build invokes prebuild:web (scripts/prebuild.ts) which:
        #   - generates public/substrate/manifest.json from the substrate folder
        #   - rebuilds essentials modules and copies them into public/content/
        #   - then runs `ng build --configuration production`
        # Without this, ng build sees an empty public/content/ and the runtime
        # module loader has no manifest to install from.
        run: npm run build

      - name: Verify build output
        run: ls -al src/hypercomb-web/dist/hypercomb-web/browser || true

      - name: Verify required web artifacts
        run: |
          set -euo pipefail
          ROOT="src/hypercomb-web/dist/hypercomb-web/browser"
          REQUIRED=(
            "index.html"
            "hypercomb.worker.js"
            "hypercomb-core.runtime.js"
            "local.png"
            "external.png"
            "house.png"
            "spw.png"
            "vendor/pixi.runtime.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "MISSING required artifact: $ROOT/$f"
              exit 1
            else
              echo "OK: $ROOT/$f ($(stat --format='%s bytes' "$ROOT/$f"))"
            fi
          done
          echo ""
          echo "All required artifacts present."

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
          output_location: ""
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
