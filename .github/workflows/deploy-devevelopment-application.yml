name: Azure Static Web Apps CI/CD (Development)

on:
  push:
    branches: [development]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node 24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: "DEBUG: Environment and toolchain versions"
        run: |
          echo "============================================"
          echo "  ENVIRONMENT"
          echo "============================================"
          echo "Node version:  $(node -v)"
          echo "npm version:   $(npm -v)"
          echo "npx version:   $(npx -v)"
          echo "OS:            $(uname -a)"
          echo "Working dir:   $(pwd)"
          echo "Disk space:"
          df -h .
          echo ""
          echo "============================================"
          echo "  REPO STRUCTURE"
          echo "============================================"
          echo "--- Top-level files ---"
          ls -la
          echo ""
          echo "--- src/ directory listing ---"
          ls -la src/
          echo ""
          echo "--- src/package.json exists? ---"
          ls -la src/package.json 2>/dev/null || echo "MISSING"
          echo ""
          echo "--- src/package-lock.json exists? ---"
          ls -la src/package-lock.json 2>/dev/null || echo "MISSING"
          echo ""
          echo "--- All package.json files ---"
          find . -name "package.json" -not -path "*/node_modules/*" | sort
          echo ""
          echo "--- All package-lock.json files ---"
          find . -name "package-lock.json" -not -path "*/node_modules/*" | sort

      - name: "DEBUG: Root package.json content"
        working-directory: src
        run: |
          echo "============================================"
          echo "  src/package.json"
          echo "============================================"
          cat package.json
          echo ""
          echo "============================================"
          echo "  package-lock.json lockfileVersion"
          echo "============================================"
          node -e "const p = require('./package-lock.json'); console.log('lockfileVersion:', p.lockfileVersion); console.log('name:', p.name); console.log('packages keys (first 20):', Object.keys(p.packages || {}).slice(0, 20))" 2>/dev/null || echo "No lock file or parse error"

      - name: "DEBUG: Essentials package.json content"
        working-directory: src/hypercomb-essentials
        run: |
          echo "============================================"
          echo "  hypercomb-essentials/package.json"
          echo "============================================"
          cat package.json
          echo ""
          echo "--- essentials package-lock.json lockfileVersion ---"
          node -e "const p = require('./package-lock.json'); console.log('lockfileVersion:', p.lockfileVersion); console.log('name:', p.name); console.log('packages keys (first 30):', Object.keys(p.packages || {}).slice(0, 30))" 2>/dev/null || echo "No lock file or parse error"
          echo ""
          echo "--- @noble/hashes in essentials lock file ---"
          grep -n "noble/hashes" package-lock.json || echo "NOT FOUND in essentials lock"
          echo ""
          echo "--- @noble/hashes in essentials package.json ---"
          grep -n "noble/hashes" package.json || echo "NOT FOUND in essentials package.json"

      - name: "DEBUG: All sub-project package.json dependencies"
        working-directory: src
        run: |
          echo "============================================"
          echo "  DEPENDENCY TREE ACROSS ALL PROJECTS"
          echo "============================================"
          for dir in hypercomb-core hypercomb-web hypercomb-essentials hypercomb-shared hypercomb-sdk diamond-core-processor hypercomb-avatars hypercomb-dev hypercomb-legacy hypercomb-cli hypercomb-relay hypercomb-mobile meadowverse; do
            if [ -f "$dir/package.json" ]; then
              echo ""
              echo "--- $dir/package.json ---"
              echo "dependencies:"
              node -e "const p = require('./$dir/package.json'); console.log(JSON.stringify(p.dependencies || {}, null, 2))" 2>/dev/null || echo "  (parse error)"
              echo "devDependencies:"
              node -e "const p = require('./$dir/package.json'); console.log(JSON.stringify(p.devDependencies || {}, null, 2))" 2>/dev/null || echo "  (parse error)"
              echo "has own lock file: $(ls $dir/package-lock.json 2>/dev/null && echo YES || echo NO)"
            fi
          done

      - name: Install workspace root dependencies
        working-directory: src
        run: |
          echo "--- Removing old node_modules and lock file ---"
          rm -rf node_modules package-lock.json
          echo "--- Running npm install ---"
          npm install 2>&1
          echo "--- npm install exit code: $? ---"

      - name: "DEBUG: Post-install root state"
        working-directory: src
        run: |
          echo "============================================"
          echo "  POST npm install - ROOT"
          echo "============================================"
          echo "--- package-lock.json regenerated? ---"
          ls -la package-lock.json 2>/dev/null || echo "MISSING - npm install did not create lock file!"
          echo ""
          echo "--- lock file version ---"
          node -e "const p = require('./package-lock.json'); console.log('lockfileVersion:', p.lockfileVersion)" 2>/dev/null || echo "Cannot read lock file"
          echo ""
          echo "--- node_modules top-level directories (first 50) ---"
          ls node_modules/ 2>/dev/null | head -50 || echo "node_modules MISSING"
          echo ""
          echo "--- @angular packages installed ---"
          ls -d node_modules/@angular/*/ 2>/dev/null || echo "No @angular packages"
          echo ""
          echo "--- @angular/cli version ---"
          node -e "console.log(require('./node_modules/@angular/cli/package.json').version)" 2>/dev/null || echo "@angular/cli NOT INSTALLED"
          echo ""
          echo "--- @angular/build version ---"
          node -e "console.log(require('./node_modules/@angular/build/package.json').version)" 2>/dev/null || echo "@angular/build NOT INSTALLED"
          echo ""
          echo "--- tsx version ---"
          node -e "console.log(require('./node_modules/tsx/package.json').version)" 2>/dev/null || echo "tsx NOT INSTALLED"
          echo ""
          echo "--- .bin directory contents ---"
          ls node_modules/.bin/ 2>/dev/null | sort || echo ".bin MISSING"
          echo ""
          echo "--- ng binary target ---"
          ls -la node_modules/.bin/ng 2>/dev/null || echo "ng binary MISSING"
          readlink node_modules/.bin/ng 2>/dev/null || echo "ng symlink target: N/A"
          echo ""
          echo "--- @noble/hashes in root node_modules ---"
          ls -la node_modules/@noble/hashes/package.json 2>/dev/null && node -e "console.log('version:', require('./node_modules/@noble/hashes/package.json').version)" || echo "@noble/hashes NOT in root node_modules"
          echo ""
          echo "--- @noble/hashes nested installs ---"
          find node_modules -path "*/@noble/hashes/package.json" 2>/dev/null | while read f; do
            echo "$f -> $(node -e "console.log(require('./$f').version)")"
          done
          echo ""
          echo "--- npm ls @noble/hashes ---"
          npm ls @noble/hashes 2>&1 || true
          echo ""
          echo "--- Workspace packages detected by npm ---"
          npm ls --depth=0 2>&1 | head -30 || true

      - name: "DEBUG: Verify essentials deps from workspace install"
        working-directory: src
        run: |
          echo "============================================"
          echo "  ESSENTIALS - installed via workspace root"
          echo "============================================"
          echo "--- @noble/hashes in root node_modules ---"
          find node_modules -path "*/@noble/hashes/package.json" 2>/dev/null | while read f; do
            echo "$f -> $(node -e "console.log(require('./$f').version)")"
          done
          echo ""
          echo "--- npm ls @noble/hashes ---"
          npm ls @noble/hashes 2>&1 || true
          echo ""
          echo "--- @angular/cli still present after workspace install? ---"
          ls -la node_modules/@angular/cli/bin/ng.js 2>/dev/null || echo "MISSING - @angular/cli was removed!"

      - name: "DEBUG: Pre-core-build state"
        working-directory: src/hypercomb-core
        run: |
          echo "============================================"
          echo "  PRE BUILD - HYPERCOMB-CORE"
          echo "============================================"
          echo "--- package.json ---"
          cat package.json
          echo ""
          echo "--- has own node_modules? ---"
          ls node_modules 2>/dev/null | head -10 || echo "No own node_modules (uses root)"
          echo ""
          echo "--- typescript version ---"
          node -e "console.log(require('../node_modules/typescript/package.json').version)" 2>/dev/null || echo "typescript NOT FOUND"

      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build

      - name: "DEBUG: Post-core-build state"
        working-directory: src/hypercomb-core
        run: |
          echo "============================================"
          echo "  POST BUILD - HYPERCOMB-CORE"
          echo "============================================"
          echo "--- dist/ contents ---"
          find dist/ -type f 2>/dev/null | head -30 || echo "No dist/ directory"
          echo ""
          echo "--- build output size ---"
          du -sh dist/ 2>/dev/null || echo "No dist/"

      - name: "DEBUG: Pre-web-build state"
        working-directory: src/hypercomb-web
        run: |
          echo "============================================"
          echo "  PRE BUILD - HYPERCOMB-WEB"
          echo "============================================"
          echo "--- package.json ---"
          cat package.json
          echo ""
          echo "--- angular.json ---"
          cat angular.json
          echo ""
          echo "--- has own node_modules? ---"
          ls node_modules 2>/dev/null | head -10 || echo "No own node_modules (uses root)"
          echo ""
          echo "--- scripts/ directory ---"
          ls -la scripts/ 2>/dev/null || echo "No scripts/ directory"
          echo ""
          echo "--- Can resolve @angular/cli from root? ---"
          ls -la ../node_modules/@angular/cli/bin/ng.js 2>/dev/null || echo "CANNOT FIND ng.js"
          echo ""
          echo "--- Can resolve tsx from root? ---"
          ls -la ../node_modules/tsx/dist/cli.mjs 2>/dev/null || echo "CANNOT FIND tsx cli.mjs"
          echo ""
          echo "--- Can resolve build-core-vendor.cjs? ---"
          ls -la ./scripts/build-core-vendor.cjs 2>/dev/null || echo "CANNOT FIND build-core-vendor.cjs"
          echo ""
          echo "--- Can resolve build-pixi-vendor.ts? ---"
          ls -la ./scripts/build-pixi-vendor.ts 2>/dev/null || echo "CANNOT FIND build-pixi-vendor.ts"
          echo ""
          echo "--- public/ assets ---"
          ls -la src/assets/ 2>/dev/null || echo "No src/assets/"
          find . -name "*.png" -not -path "*/node_modules/*" 2>/dev/null || echo "No .png files"
          echo ""
          echo "--- hypercomb-core dist available? ---"
          ls -la ../hypercomb-core/dist/ 2>/dev/null | head -10 || echo "hypercomb-core dist NOT FOUND"

      - name: Build web runtime assets
        working-directory: src/hypercomb-web
        run: |
          echo "--- Building core vendor ---"
          node ./scripts/build-core-vendor.cjs
          echo "--- Building pixi vendor ---"
          node ../node_modules/tsx/dist/cli.mjs ./scripts/build-pixi-vendor.ts
          echo "--- Runtime assets built ---"

      - name: "DEBUG: Post-runtime-assets state"
        working-directory: src/hypercomb-web
        run: |
          echo "============================================"
          echo "  POST RUNTIME ASSETS BUILD"
          echo "============================================"
          echo "--- vendor/ directory ---"
          find . -name "*.runtime.*" -not -path "*/node_modules/*" 2>/dev/null || echo "No runtime files found"
          echo ""
          echo "--- public/ directory ---"
          ls -laR src/public/ 2>/dev/null || echo "No src/public/"
          find . -path "*/vendor/*" -not -path "*/node_modules/*" 2>/dev/null || echo "No vendor files"

      - name: Build web app
        working-directory: src/hypercomb-web
        run: node ../node_modules/@angular/cli/bin/ng.js build --configuration production

      - name: "DEBUG: Post-web-build state"
        working-directory: src/hypercomb-web
        run: |
          echo "============================================"
          echo "  POST BUILD - HYPERCOMB-WEB"
          echo "============================================"
          echo "--- dist/ tree ---"
          find dist/ -type f 2>/dev/null | sort || echo "No dist/ directory"
          echo ""
          echo "--- dist/ sizes ---"
          du -sh dist/ 2>/dev/null || echo "No dist/"
          du -sh dist/hypercomb-web/browser/ 2>/dev/null || echo "No browser dir"
          echo ""
          echo "--- index.html head ---"
          head -20 dist/hypercomb-web/browser/index.html 2>/dev/null || echo "No index.html"

      - name: Verify build output
        run: ls -al src/hypercomb-web/dist/hypercomb-web/browser || true

      - name: Verify required web artifacts
        run: |
          set -euo pipefail
          ROOT="src/hypercomb-web/dist/hypercomb-web/browser"
          REQUIRED=(
            "index.html"
            "hypercomb.worker.js"
            "hypercomb-core.runtime.js"
            "local.png"
            "external.png"
            "house.png"
            "spw.png"
            "vendor/pixi.runtime.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "MISSING required artifact: $ROOT/$f"
              exit 1
            else
              echo "OK: $ROOT/$f ($(stat --format='%s bytes' "$ROOT/$f"))"
            fi
          done
          echo ""
          echo "All required artifacts present."

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
          output_location: ""
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
