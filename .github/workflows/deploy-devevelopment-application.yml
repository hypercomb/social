name: Azure Static Web Apps CI/CD (Development)

on:
  push:
    branches: [development]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node 20.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - name: Install workspace root dependencies
        working-directory: src
        run: npm install --ignore-scripts

      - name: Install essentials dependencies
        working-directory: src/hypercomb-essentials
        run: npm ci --ignore-scripts

      - name: Install web dependencies
        working-directory: src/hypercomb-web
        run: npm ci --ignore-scripts

      - name: Rebuild native binaries
        working-directory: src
        run: npm rebuild

      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build

      - name: Link shared node_modules to web (prevents dual Angular runtime)
        working-directory: src
        run: |
          rm -rf node_modules
          ln -s hypercomb-web/node_modules node_modules

      - name: Build web runtime assets
        working-directory: src/hypercomb-web
        run: npm run runtime

      - name: Build web app
        working-directory: src/hypercomb-web
        run: npm run build

      - name: Verify build output
        run: ls -al src/hypercomb-web/dist/hypercomb-web/browser || true

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DEVELOPMENT_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/hypercomb-web/dist/hypercomb-web/browser