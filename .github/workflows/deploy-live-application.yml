name: Azure Static Web Apps CI/CD (LIVE)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node 24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Install workspace root dependencies
        working-directory: src
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build

      - name: Build essentials modules
        working-directory: src/hypercomb-essentials
        run: |
          npm run build
          node ../node_modules/tsx/dist/cli.mjs ./scripts/build-module.ts --local

      - name: Validate Azure credentials (live)
        id: azure_creds
        shell: bash
        env:
          AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS_LIVE }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_CREDENTIALS_JSON:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing secret AZURE_CREDENTIALS_LIVE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node -e "
            const raw = process.env.AZURE_CREDENTIALS_JSON || '';
            try {
              const o = JSON.parse(raw);
              const required = ['clientId','clientSecret','tenantId','subscriptionId'];
              const missing = required.filter((k) => !String(o[k] || '').trim());
              if (missing.length) {
                console.log('ready=false');
                console.log('reason=missing fields: ' + missing.join(','));
              } else {
                console.log('ready=true');
                console.log('reason=ok');
              }
            } catch {
              console.log('ready=false');
              console.log('reason=invalid JSON in AZURE_CREDENTIALS_LIVE');
            }
          " | while IFS= read -r line; do echo "$line" >> "$GITHUB_OUTPUT"; done

      - name: Login to Azure for essentials publish
        id: az_login
        if: steps.azure_creds.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_LIVE }}

      - name: Publish essentials to Azure Blob Storage
        if: steps.azure_creds.outputs.ready == 'true' && steps.az_login.outcome == 'success'
        shell: pwsh
        working-directory: src/hypercomb-essentials
        run: npm run build:deploy

      - name: Verify essentials manifest
        if: steps.azure_creds.outputs.ready == 'true' && steps.az_login.outcome == 'success'
        run: |
          set -euo pipefail
          MANIFEST=$(curl -fsSL https://storagehypercomb.blob.core.windows.net/dcp/manifest.json)
          KEYS=$(echo "$MANIFEST" | jq -r '.packages | keys[]')
          if [ -z "$KEYS" ]; then
            echo "manifest.json contains no package entries"
            exit 1
          fi
          for KEY in $KEYS; do
            if ! echo "$KEY" | grep -Eq '^[a-f0-9]{64}$'; then
              echo "Invalid package key: $KEY"
              exit 1
            fi
            echo "package: $KEY"
          done

      - name: Warn if essentials publish skipped
        if: steps.azure_creds.outputs.ready != 'true' || steps.az_login.outcome != 'success'
        env:
          SKIP_REASON: ${{ steps.azure_creds.outputs.reason }}
        run: echo "Skipped essentials publish ($SKIP_REASON); web deploy continues with existing manifest resources."

      - name: Build web runtime assets
        working-directory: src/hypercomb-web
        run: |
          node ./scripts/build-core-vendor.cjs
          node ../node_modules/tsx/dist/cli.mjs ./scripts/build-pixi-vendor.ts

      - name: Build web app
        working-directory: src/hypercomb-web
        # npm run build invokes prebuild:web (scripts/prebuild.ts) which:
        #   - generates public/substrate/manifest.json from the substrate folder
        #   - rebuilds essentials modules and copies them into public/content/
        #   - then runs `ng build --configuration production`
        # Without this, ng build sees an empty public/content/ and the runtime
        # module loader has no manifest to install from.
        run: npm run build

      - name: Verify build output
        run: ls -al src/hypercomb-web/dist/hypercomb-web/browser || true

      - name: Verify required web artifacts
        run: |
          set -euo pipefail
          ROOT="src/hypercomb-web/dist/hypercomb-web/browser"
          REQUIRED=(
            "index.html"
            "hypercomb.worker.js"
            "hypercomb-core.runtime.js"
            "local.png"
            "external.png"
            "house.png"
            "spw.png"
            "vendor/pixi.runtime.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "Missing required artifact: $ROOT/$f"
              exit 1
            fi
          done

      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_LIVE_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/hypercomb-web/dist/hypercomb-web/browser
          output_location: ""
          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_LIVE_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/hypercomb-web/dist/hypercomb-web/browser