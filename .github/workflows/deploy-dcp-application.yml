name: Azure Static Web Apps CI/CD (Diamond Core Processor)
on:
  push:
    branches: [development, main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development, main]
# Both `development` and `main` push to the same Azure Static Web App
# resource (STATIC_WEBSITE_DCP_DEPLOYMENT_TOKEN). When ff-merging
# development → main, two pushes hit GitHub seconds apart, both kick off
# DCP deploys, both target the same SWA, Azure cancels the older one and
# marks it red ("Deployment Canceled"). Net bytes deployed are identical
# either way (ff-merge means same commit), but the failure pollutes the
# run list and triggers spurious notifications. A single concurrency
# group cancels the in-flight older run *before* it ever calls Azure,
# so it shows as "cancelled" (gray) and exits clean.
concurrency:
  group: dcp-deploy
  cancel-in-progress: true
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Use Node 24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          # Cache the npm download cache (~/.npm), keyed on the committed
          # lockfile — skips network fetches during `npm install` below
          # without changing the deliberate install logic.
          cache: 'npm'
          cache-dependency-path: src/package-lock.json
      # Incremental build caches, persisted across runs. Content-validated
      # by their own tooling, so a stale restore only triggers a rebuild of
      # what changed — never wrong output. This deploy builds
      # diamond-core-processor, so its Angular cache lives there.
      - name: Cache incremental build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/hypercomb-essentials/.build-cache.json
            src/hypercomb-essentials/dist/.cache
            src/diamond-core-processor/.angular/cache
          key: hc-build-dcp-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            hc-build-dcp-${{ runner.os }}-
      - name: Install workspace root dependencies
        working-directory: src
        run: |
          rm -rf node_modules package-lock.json
          npm install
      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build
      - name: Build essentials modules
        working-directory: src/hypercomb-essentials
        run: |
          npm run build
          node ../node_modules/tsx/dist/cli.mjs ./scripts/build-module.ts --local
          node ../node_modules/tsx/dist/cli.mjs ./scripts/copy-to-dcp.ts
      - name: Install diamond-core-processor dependencies
        working-directory: src/diamond-core-processor
        run: npm install
      # index.html loads env.js unconditionally (per-developer dev overrides,
      # gitignored). The other apps get a stub via prebuild.ts; DCP's CI calls
      # ng build directly, so write the stub here or every iframe load of the
      # deployed DCP 404s in the host page's console. No secrets — ever.
      - name: Write env.js stub (no secrets)
        run: node src/scripts/write-env-js.cjs src/diamond-core-processor/public
      - name: Build diamond-core-processor
        working-directory: src/diamond-core-processor
        run: npx ng build --configuration production
      - name: Verify build output
        run: |
          set -euo pipefail
          ROOT="src/diamond-core-processor/dist/diamond-core-processor/browser"
          REQUIRED=(
            "index.html"
            "manifest.json"
            "staticwebapp.config.json"
            "env.js"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "MISSING required artifact: $ROOT/$f"
              exit 1
            else
              echo "OK: $ROOT/$f"
            fi
          done
          # Essentials content now ships as FLAT signature-named files at the
          # app root (the __bees__/__layers__/__dependencies__ typed dirs were
          # retired — copy-to-dcp.ts emits bare <sig> files + manifest.json).
          # Verify the manifest lists packages and the flat sig files landed.
          PKG_KEYS=$(jq -r '.packages | keys[]' "$ROOT/manifest.json")
          if [ -z "$PKG_KEYS" ]; then
            echo "manifest.json contains no package entries"
            exit 1
          fi
          SIG_COUNT=$(find "$ROOT" -maxdepth 1 -type f -regextype posix-extended -regex '.*/[0-9a-f]{64}' | wc -l)
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "No flat signature-named content files found in $ROOT"
            exit 1
          fi
          echo "OK: manifest packages present; $SIG_COUNT flat content files."
          echo ""
          echo "All required artifacts present."
      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DCP_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/diamond-core-processor/dist/diamond-core-processor/browser
          output_location: ""
          api_location: ""
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DCP_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/diamond-core-processor/dist/diamond-core-processor/browser