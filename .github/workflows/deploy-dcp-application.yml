name: Azure Static Web Apps CI/CD (Diamond Core Processor)
on:
  push:
    branches: [development, main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [development, main]
jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Use Node 24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
      - name: Install workspace root dependencies
        working-directory: src
        run: |
          rm -rf node_modules package-lock.json
          npm install
      - name: Build hypercomb-core
        working-directory: src/hypercomb-core
        run: npm run build
      - name: Build essentials modules
        working-directory: src/hypercomb-essentials
        run: |
          npm run build
          node ../node_modules/tsx/dist/cli.mjs ./scripts/build-module.ts --local
          node ../node_modules/tsx/dist/cli.mjs ./scripts/copy-to-dcp.ts
      - name: Install diamond-core-processor dependencies
        working-directory: src/diamond-core-processor
        run: npm install
      - name: Build diamond-core-processor
        working-directory: src/diamond-core-processor
        run: npx ng build --configuration production
      - name: Verify build output
        run: |
          set -euo pipefail
          ROOT="src/diamond-core-processor/dist/diamond-core-processor/browser"
          REQUIRED=(
            "index.html"
            "manifest.json"
            "staticwebapp.config.json"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$ROOT/$f" ]; then
              echo "MISSING required artifact: $ROOT/$f"
              exit 1
            else
              echo "OK: $ROOT/$f"
            fi
          done
          # Verify essentials content was copied into the build
          for dir in __bees__ __layers__ __dependencies__; do
            if [ ! -d "$ROOT/$dir" ] || [ -z "$(ls -A "$ROOT/$dir")" ]; then
              echo "MISSING or empty essentials directory: $ROOT/$dir"
              exit 1
            else
              echo "OK: $ROOT/$dir ($(ls "$ROOT/$dir" | wc -l) files)"
            fi
          done
          echo ""
          echo "All required artifacts present."
      - name: Upload to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DCP_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/diamond-core-processor/dist/diamond-core-processor/browser
          output_location: ""
          api_location: ""
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.STATIC_WEBSITE_DCP_DEPLOYMENT_TOKEN }}
          action: close
          app_location: src/diamond-core-processor/dist/diamond-core-processor/browser