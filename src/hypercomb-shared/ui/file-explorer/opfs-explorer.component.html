<!-- hypercomb-shared/ui/file-explorer/opfs-explorer.component.html -->

<div class="opfs-explorer">
  <!-- header -->
  <div class="title">
    <div class="title-left">
      <span class="title-icon" aria-hidden="true">📁</span>
      <span>{{ 'explorer.title' | t }}</span>
    </div>

    <button
      type="button"
      class="icon-button gear"
      [class.is-on]="showAll()"
      [title]="'explorer.toggle-raw' | t"
      (click)="toggleShowAll()"
      [attr.aria-label]="'explorer.toggle-raw' | t"
    >
      <span aria-hidden="true">⚙</span>
    </button>
  </div>

  <!-- current path -->
  <div class="toolbar">
    <span class="path">/{{ domain }}{{ directory() }}</span>
  </div>

  <!-- add controls -->
  <div class="toolbar add-toolbar">
    <input
      type="text"
      name="entry-name"
      [placeholder]="'explorer.name-placeholder' | t"
      [(ngModel)]="newName"
      class="name-input"
    />

    <button type="button" class="btn" (click)="createFolder()">
      {{ 'explorer.add-folder' | t }}
    </button>

    <button type="button" class="btn" (click)="createFile()">
      {{ 'explorer.add-file' | t }}
    </button>

    <button type="button" class="btn" (click)="addDependency()">
      {{ 'explorer.add-dependency' | t }}
    </button>
  </div>

  <!-- table -->
  <div class="table-container" role="region" aria-label="opfs entries">
    <table class="opfs-table" aria-label="opfs entries table">
      <thead>
        <tr>
          <th class="col-icon" aria-hidden="true"></th>
          <th class="col-name">{{ 'explorer.col-name' | t }}</th>
          <th class="col-actions">{{ 'explorer.col-actions' | t }}</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let e of entries(); trackBy: trackByName"
          class="row"
          [class.is-dir]="e.kind === 'directory'"
          (click)="explore(e.name)"
          tabindex="0"
          (keydown.enter)="explore(e.name)"
        >
          <td class="cell-icon" aria-hidden="true">
            <span class="icon">{{ icon(e) }}</span>
          </td>

          <td class="cell-name">
            <span class="label">{{ e.label }}</span>
            <span class="sub" *ngIf="showAll()">{{ e.name }}</span>
          </td>

          <td class="cell-actions">
            <button type="button" class="icon-button" [title]="'explorer.run' | t" [attr.aria-label]="'explorer.run' | t" (click)="run(e, $event)">
              <span aria-hidden="true">▶</span>
            </button>

            <button type="button" class="btn-small" [title]="'explorer.copy' | t" [attr.aria-label]="'explorer.copy' | t" (click)="copyDetails(e, $event)">
              {{ 'explorer.copy' | t }}
            </button>

            <button type="button" class="icon-button danger" [title]="'explorer.remove' | t" [attr.aria-label]="'explorer.remove' | t" (click)="remove(e, $event)">
              <span aria-hidden="true">🗑</span>
            </button>
          </td>
        </tr>

        <tr *ngIf="entries().length === 0">
          <td class="empty" colspan="3">{{ 'explorer.no-entries' | t }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
