<!-- hypercomb-shared/ui/file-explorer/opfs-explorer.component.html -->

<div class="opfs-explorer">
  <!-- header -->
  <div class="title">
    <div class="title-left">
      <span class="title-icon" aria-hidden="true">📁</span>
      <span>OPFS Explorer</span>
    </div>

    <button
      type="button"
      class="icon-button gear"
      [class.is-on]="showAll()"
      title="toggle raw view"
      (click)="showAll.set(!showAll())"
      aria-label="toggle raw view"
    >
      <span aria-hidden="true">⚙</span>
    </button>
  </div>

  <!-- current path -->
  <div class="toolbar">
    <span class="path">{{ directory() }}</span>
  </div>

  <!-- add controls -->
  <div class="toolbar add-toolbar">
    <input
      type="text"
      placeholder="name"
      [(ngModel)]="newName"
      class="name-input"
    />

    <button type="button" class="btn" (click)="createFolder()">
      add folder
    </button>

    <button type="button" class="btn" (click)="createFile()">
      add file
    </button>

    <button type="button" class="btn" (click)="addDependency()">
      add dependency
    </button>
  </div>

  <!-- table -->
  <div class="table-container" role="region" aria-label="opfs entries">
    <table class="opfs-table" aria-label="opfs entries table">
      <thead>
        <tr>
          <th class="col-icon" aria-hidden="true"></th>
          <th class="col-name">name</th>
          <th class="col-actions">actions</th>
        </tr>
      </thead>

      <tbody>
        <tr
          *ngFor="let e of entries(); trackBy: trackByName"
          class="row"
          [class.is-dir]="e.kind === 'directory'"
          (click)="explore(e.name)"
          tabindex="0"
          (keydown.enter)="explore(e.name)"
        >
          <td class="cell-icon" aria-hidden="true">
            <span class="icon">{{ icon(e) }}</span>
          </td>

          <td class="cell-name">
            <span class="label">{{ e.label }}</span>
            <span class="sub" *ngIf="showAll()">{{ e.name }}</span>
          </td>

          <td class="cell-actions">
            <button type="button" class="icon-button" title="run" aria-label="run" (click)="run(e, $event)">
              <span aria-hidden="true">▶</span>
            </button>

            <button type="button" class="btn-small" title="copy" aria-label="copy" (click)="copyDetails(e, $event)">
              copy
            </button>

            <button type="button" class="icon-button danger" title="delete" aria-label="delete" (click)="delete(e, $event)">
              <span aria-hidden="true">🗑</span>
            </button>
          </td>
        </tr>

        <tr *ngIf="entries().length === 0">
          <td class="empty" colspan="3">no entries</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
