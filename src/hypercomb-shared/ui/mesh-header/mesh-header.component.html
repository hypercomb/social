<div class="mesh-header" [class.secret-active]="showSecretInput()">
  <!-- Secret input: visible when in shield mode and editing -->
  @if (showSecretInput()) {
    <div class="secret-input-wrap">
      <input
        class="header-secret-input"
        type="text"
        [placeholder]="'mesh.secret-placeholder' | t"
        [value]="secretValue()"
        (input)="onSecretInput($event)"
        (keydown.enter)="submitSecret($event)"
        (keydown.escape)="cancelSecret()"
      />
    </div>
  }

  <!-- Secured label: visible when has secret and input is collapsed -->
  @if (meshPublic && hasSecret() && !showSecretInput()) {
    <span class="secured-label" [style.color]="shieldColor()" (click)="expandSecret()">{{ 'mesh.secured' | t }}</span>
  }

  <!-- Mode icon: always visible, always rightmost -->
  <button class="mode-toggle"
    [class.solo-mode]="!meshPublic"
    [class.shield-mode]="!!meshPublic"
    [style.--shield-color]="shieldColor()"
    [title]="shieldTooltip()"
    type="button"
    (pointerdown)="onPointerDown()"
    (pointerup)="onPointerUp()"
    (pointerleave)="onPointerUp()">
    <span class="hci">{{ meshPublic ? 'e' : 'i' }}</span>
  </button>
</div>

<!-- Mode breadcrumb: fixed below header, right-aligned -->
@if (!showSecretInput()) {
  <div class="mode-crumb">
    <span class="mode-crumb-label" [class.solo-mode]="!meshPublic" [class.shield-mode]="!!meshPublic" [style.color]="meshPublic ? shieldColor() : null">{{ meshPublic ? 'public' : 'solo' }}</span>
    @if (secretWords()) {
      <span class="mode-crumb-sep">/</span><span class="mode-crumb-words">{{ secretWords() }}</span>
    }
  </div>
}
