<div class="mesh-header">
  @if (meshPublic) {
    <button class="mode-toggle world-toggle"
      [class.active]="worldMode()"
      type="button"
      [title]="'controls.world-mode' | t"
      [attr.aria-label]="'controls.world-mode' | t"
      (click)="toggleWorldMode()">
      <span class="mat-sym" [class.filled]="worldMode()">public</span>
    </button>
  }
  <button class="mode-toggle"
    [class.solo-mode]="!meshPublic"
    [class.shield-mode]="!!meshPublic"
    [style.--shield-color]="shieldColor()"
    type="button"
    (click)="onToggle()">
    <span class="mat-sym" [class.filled]="meshPublic">{{ meshPublic ? 'groups' : 'person' }}</span>
  </button>
</div>
