<div class="mesh-header" [class.secret-active]="showSecretInput()">
  <!-- Secret input: visible in swarm when no secret or manually expanded -->
  @if (showSecretInput()) {
    <div class="secret-input-wrap">
      <input
        class="header-secret-input" [class.has-secret]="hasSecret()"
        [class.revealed]="secretRevealed()"
        type="text"
        placeholder="secure your location"
        [value]="secretValue()"
        (input)="onSecretInput($event)"
        (keydown.enter)="submitSecret($event)"
      />
      @if (hasSecret()) {
        <button class="secret-eye" type="button" (click)="onEyeClick()">
          <span class="hci">c</span>
        </button>
      }
    </div>
    @if (hasSecret()) {
      <button class="secret-clear" type="button" (click)="clearSecret()">
        &times;
      </button>
    }
  }

  <!-- Shield: always visible, always rightmost -->
  <button class="mode-toggle"
    [class.solo-mode]="!meshPublic"
    [class.public-mode]="meshPublic && !showSecretInput()"
    [class.secret-mode]="meshPublic && showSecretInput()"
    [class.has-secret]="hasSecret()"
    [style.--shield-color]="shieldColor()"
    type="button"
    (pointerdown)="onPointerDown()"
    (pointerup)="onPointerUp()"
    (pointerleave)="onPointerUp()">
    @if (!meshPublic) {
      <span class="mode-label">solo</span>
    } @else if (hasSecret() && !secretExpanded()) {
      <span class="mode-label">swarm</span>
    }
    <span class="hci">e</span>
  </button>
</div>
