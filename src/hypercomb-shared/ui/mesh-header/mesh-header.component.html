@if (meshPublic()) {
  <div class="mesh-public">
    <button class="shield-toggle" [class.has-secret]="hasSecret()"
      [style.--shield-color]="shieldColor()" type="button" (click)="onShieldClick()">
      <span class="hci">e</span>
    </button>
    @if (secretExpanded()) {
      <input
        class="header-secret-input" [class.has-secret]="hasSecret()"
        [class.revealed]="secretRevealed()"
        type="text"
        placeholder="secure your location"
        [value]="secretValue()"
        (input)="onSecretInput($event)"
        (keydown.enter)="submitSecret()"
      />
      <button class="eye-toggle" type="button" (click)="onEyeClick()">
        <span class="hci">c</span>
      </button>
    }
    <button class="public-toggle" type="button" (click)="meshToggled.emit()">
      public
    </button>
  </div>
} @else {
  <button class="private-toggle" type="button" (click)="meshToggled.emit()">
    private
  </button>
}
