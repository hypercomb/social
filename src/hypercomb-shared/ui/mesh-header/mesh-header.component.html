<div class="mesh-header" [class.secret-active]="secretExpanded()">
  <!-- Solo state: lens flare icon -->
  @if (!meshPublic) {
    <button class="mode-toggle solo-mode" type="button"
      (click)="cycleMode()">
      <span class="solo-icon">&#x2726;</span>
      <span class="mode-label">solo</span>
    </button>
  }

  <!-- Public state: shield icon -->
  @if (meshPublic && !secretExpanded()) {
    <button class="mode-toggle public-mode" [class.has-secret]="hasSecret()"
      [style.--shield-color]="shieldColor()" type="button"
      (click)="cycleMode()">
      <span class="hci">e</span>
      <span class="mode-label">swarm</span>
    </button>
  }

  <!-- Secret state: secret input + shield right -->
  @if (meshPublic && secretExpanded()) {
    @if (hasSecret()) {
      <button class="secret-clear" type="button" (click)="clearSecret()">
        &times;
      </button>
    }
    <div class="secret-input-wrap">
      <input
        class="header-secret-input" [class.has-secret]="hasSecret()"
        [class.revealed]="secretRevealed()"
        type="text"
        placeholder="secure your location"
        [value]="secretValue()"
        (input)="onSecretInput($event)"
        (keydown.enter)="submitSecret($event)"
      />
      @if (hasSecret()) {
        <button class="secret-eye" type="button" (click)="onEyeClick()">
          <span class="hci">c</span>
        </button>
      }
    </div>
    <button class="mode-toggle secret-mode" [class.has-secret]="hasSecret()"
      [style.--shield-color]="shieldColor()" type="button"
      (click)="cycleMode()">
      <span class="hci">e</span>
    </button>
  }
</div>
