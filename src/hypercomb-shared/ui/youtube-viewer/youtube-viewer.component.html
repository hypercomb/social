@if (embedUrl(); as url) {
  <div class="viewer-backdrop" [class.chrome-hidden]="!chromeVisible()"
       (click)="onBackdropClick()" (pointermove)="onPointerMove()">
    <div class="video-container" (click)="$event.stopPropagation()">
      <iframe
        [src]="url"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <button class="exit-fab" (click)="$event.stopPropagation(); close()"
            [title]="'viewer.close' | t" [attr.aria-label]="'viewer.close' | t">
      <span class="exit-label">{{ 'viewer.close' | t }}</span>
      <span class="exit-glyph">close</span>
    </button>
  </div>
}
