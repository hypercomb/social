@if (visible()) {
  <div class="context-menu"
       [style.left.px]="posX()"
       [style.top.px]="posY()"
       [style.transform]="'scale(' + zoom() + ')'"
       [class.dragging]="dragging()">

    <!-- drag handle (move only; no resize) -->
    <div class="drag-handle horizontal"
         (pointerdown)="onDragStart($event)"
         aria-label="drag to move">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>

    <!-- action buttons -->
    <button class="ctx-btn" (click)="moveItem()" [class.active]="moveMode()" [attr.aria-label]="'selection.move' | t">
      <span class="hci">Z</span>
    </button>
    <button class="ctx-btn" (click)="cut()" [attr.aria-label]="'selection.cut' | t">
      <span class="hci">F</span>
    </button>
    <button class="ctx-btn" (click)="copy()" [attr.aria-label]="'selection.copy' | t">
      <span class="hci">%</span>
    </button>
    <button class="ctx-btn" (click)="remove()" [attr.aria-label]="'selection.remove' | t">
      <span class="hci">Q</span>
    </button>

    <div class="ctx-divider"></div>
    <button class="ctx-btn" (click)="hide()" [attr.aria-label]="'selection.hide' | t">
      <span class="eye-icon" [class.struck]="!allHidden()"></span>
    </button>
    <button class="ctx-btn" (click)="reroll()" [attr.aria-label]="'selection.reroll' | t">
      <span class="reroll-icon"></span>
    </button>

    @if (clipboardCount() > 0) {
      <div class="ctx-divider"></div>
      <button class="ctx-btn" (click)="paste()" [attr.aria-label]="'selection.paste' | t">
        <span class="hci" style="color:#4caf50">G</span>
      </button>
    }
  </div>
}
