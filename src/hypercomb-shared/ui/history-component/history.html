<!-- src/app/history-component/history.html -->

<div id="history">
  <h2>{{ 'history.title' | t }}</h2>

  <div class="controls">
    <button (click)="back()">{{ 'history.back' | t }}</button>
    <button (click)="forward()">{{ 'history.forward' | t }}</button>
  </div>

  <p><strong>{{ 'history.length' | t }}</strong> {{ length() }}</p>
  <p><strong>{{ 'history.index' | t }}</strong> {{ current() }}</p>
  <p><strong>{{ 'history.path' | t }}</strong> {{ path() }}</p>
  <p><strong>{{ 'history.depth' | t }}</strong> {{ depth() }}</p>
  <p><strong>{{ 'history.active' | t }}</strong> {{ active() }}</p>
</div>
