<!-- src/app/common/portal/portal-overlay.component.html -->
@if (isOpen) {
  <div class="backdrop" (click)="close()"></div>

  <div class="panel" role="dialog" data-consumes-wheel hcWidget="portal" anchor="center">
    <iframe
      class="portal-frame"
      [src]="portalSrc"
      sandbox="allow-scripts allow-forms allow-same-origin"
      referrerpolicy="no-referrer"
    ></iframe>

    <!-- Iframe-address breadcrumb. Matches the top-right corner where the
         install-crumb sits in the underlying shell so the participant has
         continuous awareness of "which host am I looking at right now." -->
    @if (addressLabel) {
      <div class="portal-address" [title]="activeUrl ?? ''">
        <span class="address-dot"></span>
        <span class="address-text">{{ addressLabel }}</span>
      </div>
    }

    <!-- Bottom action bar. The ×/back button DISMISSES — it never installs.
         When there are pending changes (+adds / −removes), an explicit "Done"
         button appears: it is the ONLY thing that folds the adds in and
         un-folds the removes (recoverable). Dismissing discards the pending
         diff, which DCP keeps and re-surfaces next open. -->
    <div class="portal-actions">
      @if (pendingAdds || pendingRemoves) {
        <div class="portal-diff" [attr.aria-label]="'portal.pending-changes' | t">
          @if (pendingAdds) { <span class="diff-add">+{{ pendingAdds }}</span> }
          @if (pendingRemoves) { <span class="diff-remove">&minus;{{ pendingRemoves }}</span> }
        </div>
      }

      <button class="portal-close" (click)="close()">
        <span class="close-icon">&times;</span>
        <span class="close-label">{{ 'portal.back' | t }}</span>
      </button>

      @if (hasPendingCommit) {
        <button class="portal-apply" (click)="apply()">
          <span class="apply-label">{{ 'portal.done' | t }}</span>
        </button>
      }
    </div>
  </div>
}
