<!-- hypercomb-shared/ui/command-line/command-line.component.html -->

<div class="command-line-wrapper" [style.visibility]="touchDragging() || viewActive() ? 'hidden' : null">
  <hc-command-shell
    #shell
    [suggestions]="suggestions()"
    [placeholder]="placeholder()"
    [ghostValue]="ghostValue()"
    [showSuggestions]="showCompletions()"
    [typedPrefix]="completionTypedPrefix()"
    [descriptionMap]="descriptionMap()"
    [activeDetail]="activeDetail()"
    [colorMap]="dropdownColorMap()"
    [indicators]="activeIndicators()"
    [armedResource]="armedResource()"
    [showOpenForSubscribersToggle]="showOpenForSubscribersToggle()"
    [openForSubscribers]="openForSubscribers()"
    [openForSubscribersLabel]="'command-line.open-for-subscribers' | t"
    [viewToggles]="viewToggles()"
    [notesPanelOpen]="notesPanelOpen()"
    [notesLabel]="'controls.notes' | t"
    [helpLabel]="'slash.help' | t"
    [feedbackPanelOpen]="feedbackPanelOpen()"
    [feedbackLabel]="'feedback.button' | t"
    [pheromoneScopeIcon]="pheromoneScopeIcon()"
    [pheromonesLabel]="'tags.panel.open' | t"
    [lockedFlash]="lockedFlash()"
    [lockedLabel]="'command-line.pinned' | t"
    (valueChange)="onShellValueChange($event)"
    (commit)="onShellCommit($event)"
    (completionAccepted)="onShellCompletionAccepted($event)"
    (shellKeydown)="onShellKeydown($event)"
    (indicatorDismiss)="onIndicatorDismiss($event)"
    (armedResourceDismiss)="onArmedResourceDismiss()"
    (openForSubscribersToggle)="onOpenForSubscribersToggle()"
    (viewToggle)="onViewToggle($event)"
    (notesToggle)="onNotesToggle()"
    (helpToggle)="onHelpToggle()"
    (feedbackToggle)="onFeedbackToggle()"
    (pheromonesToggle)="onPheromonesToggle()"
  />

  <!-- Per-LEVEL pinned quick links — entrances the participant dragged up
       from a tile's ⋮ feature icon. Scoped to the current level only; also
       the drop target while a badge drag is in flight.

       This is the ONLY icon strip in the command line. Launch groups no
       longer auto-render a row of aggregate meaning-icons here (websites,
       games, …): an entrance earns a place in the chrome only by being
       dragged up, and a group's page is still reached by address or from
       the `/sets` landing. The Pools of Meaning portal is likewise NOT here —
       it lives on the control bar (controls-bar 'pools'). -->
  <hc-pinned-entrances></hc-pinned-entrances>

  @if (voiceSupported && pushToTalkEnabled()) {
    <button class="mic-btn" [class.recording]="voiceActive()"
      (pointerdown)="startVoice($event)" (pointerup)="stopVoice()" (pointerleave)="stopVoice()"
      [attr.aria-label]="'controls.voice' | t" [title]="'controls.voice-hold' | t">
      <span class="mic-dot">{{ voiceActive() ? '●' : '○' }}</span>
    </button>
  }
  <!-- mobile-only GO/submit button: commits text (creating a tile) if any,
       otherwise just collapses the command-line back to hidden. -->
  <button class="mobile-go-btn" type="button" (click)="closeMobileInput()"
    [attr.aria-label]="'command-line.go' | t">
    {{ 'command-line.go' | t }}
  </button>
</div>

<!-- Active-view exit toggle — when a full-viewport view (website) takes
     over, the command line is hidden; this lone icon hovers in the
     bottom-right corner and drops back to tiles when clicked. Sibling of
     the wrapper (not inside it) so the wrapper's visibility:hidden in
     website mode never hides it too. -->
@if (viewActive() && activeViewToggle(); as vt) {
  <button
    class="site-view-exit"
    type="button"
    (click)="onViewToggle({ view: vt.view, disable: false })"
    [attr.aria-label]="vt.label"
    [attr.aria-pressed]="true"
    [title]="vt.label"
  >
    <span class="mat-sym" aria-hidden="true">{{ vt.icon }}</span>
  </button>
}

<hc-hint-bar
  [items]="hintItems()"
  [filter]="hintFilter()"
  [chosen]="hintChosen()"
  [colorMap]="accentColorMap()"
  (pick)="onHintPick($event)"
/>
