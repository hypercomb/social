@if (open()) {
  <div class="landing" role="dialog" [attr.aria-label]="'website-landing.title' | t">
    <button class="landing-close mat-sym" type="button" (click)="close()" [attr.aria-label]="'website-landing.close' | t" [title]="'website-landing.close' | t">
      close
    </button>

    <div class="landing-scroll">
      <div class="landing-inner">
        <header class="landing-head">
          <div class="landing-heading">
            <h1 class="landing-title">{{ 'website-landing.title' | t }}</h1>
            @if (sites().length > 0) {
              <span class="landing-count">{{ sites().length }}</span>
            }
          </div>
          <p class="landing-lede">{{ 'website-landing.lede' | t }}</p>
        </header>

        @if (sites().length === 0) {
          <p class="landing-empty">{{ 'website-landing.empty' | t }}</p>
        } @else {
          <ul class="landing-grid" role="list">
            @for (site of sites(); track site.key) {
              <li class="site-slot">
                <button class="site-remove mat-sym" type="button"
                        (click)="removeSite(site, $event)"
                        [attr.aria-label]="'website-landing.remove' | t"
                        [title]="'website-landing.remove' | t">
                  close
                </button>
                <button class="site-card" type="button" (click)="openSite(site)"
                        (pointerenter)="warmSite(site)"
                        [style.--accent]="accent(site.label)">
                  <span class="site-hex">
                    @if (images().get(site.key); as img) {
                      <img class="site-hex-img" [src]="img" alt="" decoding="async" />
                    } @else {
                      <span class="site-hex-fallback">
                        <span class="site-icon mat-sym">{{ site.icon || 'language' }}</span>
                      </span>
                    }
                  </span>
                  <span class="site-name">{{ site.label }}</span>
                </button>
              </li>
            }
          </ul>
        }
      </div>
    </div>
  </div>
}
