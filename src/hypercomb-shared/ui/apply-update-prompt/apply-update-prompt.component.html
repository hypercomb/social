@if (open()) {
  <div class="au-backdrop" (click)="dismiss()"></div>
  <div class="au-panel" role="alertdialog" [attr.aria-label]="'apply-update.title' | t" data-consumes-wheel>

    <header class="au-header">
      <h3>{{ 'apply-update.title' | t }}</h3>
      <button class="au-close" type="button" (click)="dismiss()" [attr.aria-label]="'apply-update.close' | t">&times;</button>
    </header>

    <div class="au-body">
      <!-- Visualization: a honeycomb cluster sized to the new-feature count.
           Hidden for a pure-removal update (count 0) so there's no empty gap. -->
      @if (count() > 0) {
        <div class="au-comb" aria-hidden="true">
          <svg class="au-comb-svg" [attr.viewBox]="combViewBox()" xmlns="http://www.w3.org/2000/svg">
            @for (cell of hexCells(); track cell.i) {
              <polygon class="au-hex" [attr.points]="cell.points" [style.--i]="cell.i"></polygon>
            }
          </svg>
        </div>
      }

      <p class="au-count">{{ 'apply-update.count' | t: { count: count() } }}</p>
      @if (versionLine()) {
        <p class="au-version">{{ versionLine() }}</p>
      }
      <p class="au-changes">{{ 'apply-update.changes' | t }}</p>
    </div>

    <footer class="au-actions">
      <button class="au-btn cancel" type="button" (click)="dismiss()">{{ 'apply-update.not-now' | t }}</button>
      <button class="au-btn apply" type="button" (click)="confirm()">{{ 'apply-update.apply' | t }}</button>
    </footer>

  </div>
}
