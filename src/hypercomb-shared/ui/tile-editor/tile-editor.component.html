@if (open()) {
  <div class="editor-backdrop" (click)="save()"></div>

  <div class="editor-panel" role="dialog" [attr.aria-label]="'editor.title' | t">
    <header class="editor-header">
      <span class="hci header-icon">k</span>
      <h3>{{ cell() }}</h3>
      <button class="editor-close" type="button" (click)="save()">
        <span class="hci">Q</span>
      </button>
    </header>

    <div class="editor-body">
      <!-- image editor area -->
      <div class="image-section">
        <div
          class="image-canvas"
          [class.flat-top]="isFlat"
          #imageCanvas
          (dragover)="onDragOver($event)"
          (drop)="onImageDrop($event)"
        >
          @if (!hasImage()) {
            <div class="image-placeholder">
              <span class="hci placeholder-icon">U</span>
              <span>{{ 'editor.drop-image' | t }}</span>
            </div>
          }
          <div class="hex-frame"></div>
        </div>

        <div class="image-controls">
          <button type="button" class="link-btn" [class.linked]="isLinked" (click)="toggleLink()" [attr.title]="(isLinked ? 'editor.unlink-transforms' : 'editor.link-transforms') | t">
            <span class="link-icon" [class.broken]="!isLinked"></span>
          </button>
          <button type="button" class="upload-btn" (click)="fileInput.click()">
            <span class="hci">U</span> {{ 'editor.upload' | t }}
          </button>
          <button type="button" class="camera-btn" (click)="openCamera()">
            <span class="hci">U</span> {{ 'editor.camera' | t }}
          </button>
          <button type="button" class="orientation-btn" (click)="toggleOrientation()" [attr.title]="(isFlat ? 'editor.switch-to-point' : 'editor.switch-to-flat') | t">
            <span class="hci">r</span> {{ (isFlat ? 'editor.flat-top' : 'editor.point-top') | t }}
          </button>
          <input #fileInput type="file" name="tile-image" accept="image/*" hidden (change)="onFileSelect($event)" />
        </div>
      </div>

      <!-- content slots -->
      <hc-slot-editor></hc-slot-editor>

      <!-- property fields -->
      <div class="fields">
        <label class="field-row">
          <span class="field-label"><span class="hci">*</span> {{ 'editor.link' | t }}</span>
          <input
            class="field-input link-input"
            [class.link-denied]="linkDenied"
            [class.link-warned]="linkWarned"
            type="text"
            name="tile-link"
            placeholder="https://..."
            [ngModel]="linkValue"
            (ngModelChange)="linkValue = $event"
            (blur)="onLinkBlur()"
            [title]="linkSafetyReason"
          />
        </label>

        <div class="color-row">
          <label class="color-control">
            <span class="color-btn">
              <span class="hci">s</span> {{ 'editor.bg' | t }}
            </span>
            <input
              class="field-input color-text"
              type="text"
              name="tile-background-color-text"
              placeholder="#1E1E1E"
              [ngModel]="backgroundColorValue"
              (ngModelChange)="backgroundColorValue = $event; onBackgroundColorChange($event)"
            />
            <input
              class="color-picker"
              type="color"
              name="tile-background-color"
              [ngModel]="backgroundColorValue || '#1E1E1E'"
              (ngModelChange)="backgroundColorValue = $event; onBackgroundColorChange($event)"
            />
          </label>

          <label class="color-control">
            <span class="color-btn">
              <span class="hci">s</span> {{ 'editor.border' | t }}
            </span>
            <input
              class="field-input color-text"
              type="text"
              name="tile-border-color-text"
              placeholder="#000000"
              [ngModel]="borderColorValue"
              (ngModelChange)="borderColorValue = $event; onBorderColorChange($event)"
            />
            <input
              class="color-picker"
              type="color"
              name="tile-border-color"
              [ngModel]="borderColorValue || '#000000'"
              (ngModelChange)="borderColorValue = $event; onBorderColorChange($event)"
            />
          </label>
        </div>

      </div>
    </div>

    <footer class="editor-footer">
      <div class="footer-tools">
        <button type="button" class="tool-btn" [title]="'editor.search-google' | t" (click)="searchGoogle()">
          <span class="hci">)</span>
        </button>
      </div>
      <div class="footer-actions">
        <button type="button" (click)="cancel()">{{ 'editor.cancel' | t }}</button>
        <button type="button" class="primary" (click)="save()">{{ 'editor.save' | t }}</button>
      </div>
    </footer>
  </div>

  @if (cameraActive) {
    <div class="camera-overlay">
      <video #cameraVideo autoplay playsinline></video>
      <div class="camera-hex-frame" [class.flat-top]="cameraFlat"></div>
      <div class="camera-controls">
        <button type="button" class="camera-control-btn" (click)="closeCamera()">
          <span class="hci">Q</span>
        </button>
        <button type="button" class="camera-shutter" (click)="capturePhoto()"></button>
        <button type="button" class="camera-control-btn" (click)="toggleCameraOrientation()">
          <span class="hci">r</span>
        </button>
      </div>
    </div>
  }
}
