@if (open()) {
  <div class="editor-backdrop" (click)="cancel()"></div>

  <div class="editor-panel" role="dialog" aria-label="tile editor">
    <header class="editor-header">
      <span class="hci header-icon">#</span>
      <h3>{{ seed() }}</h3>
      <button class="editor-close" type="button" (click)="cancel()">
        <span class="hci">Q</span>
      </button>
    </header>

    <div class="editor-body">
      <!-- image editor area -->
      <div class="image-section">
        <div
          class="image-canvas"
          [class.flat-top]="isFlat"
          #imageCanvas
          (dragover)="onDragOver($event)"
          (drop)="onImageDrop($event)"
        >
          @if (!hasImage()) {
            <div class="image-placeholder">
              <span class="hci placeholder-icon">U</span>
              <span>drop image here</span>
            </div>
          }
          <div class="hex-frame"></div>
        </div>

        <div class="image-controls">
          <button type="button" class="link-btn" [class.linked]="isLinked" (click)="toggleLink()" [attr.title]="isLinked ? 'unlink transforms' : 'link transforms'">
            <span class="link-icon" [class.broken]="!isLinked"></span>
          </button>
          <button type="button" class="upload-btn" (click)="fileInput.click()">
            <span class="hci">U</span> upload
          </button>
          <button type="button" class="orientation-btn" (click)="toggleOrientation()" [attr.title]="isFlat ? 'switch to point-top' : 'switch to flat-top'">
            <span class="hci">r</span> {{ isFlat ? 'flat-top' : 'point-top' }}
          </button>
          <input #fileInput type="file" name="tile-image" accept="image/*" hidden (change)="onFileSelect($event)" />
        </div>
      </div>

      <!-- property fields -->
      <div class="fields">
        <label class="field-row">
          <span class="field-label"><span class="hci">*</span> link</span>
          <input
            class="field-input link-input"
            type="text"
            name="tile-link"
            placeholder="https://..."
            [ngModel]="linkValue"
            (ngModelChange)="linkValue = $event; onLinkChange($event)"
          />
        </label>

        <div class="color-row">
          <label class="color-control">
            <span class="color-btn">
              <span class="hci">s</span> bg
            </span>
            <input
              class="field-input color-text"
              type="text"
              name="tile-background-color-text"
              placeholder="#1E1E1E"
              [ngModel]="backgroundColorValue"
              (ngModelChange)="backgroundColorValue = $event; onBackgroundColorChange($event)"
            />
            <input
              class="color-picker"
              type="color"
              name="tile-background-color"
              [ngModel]="backgroundColorValue || '#1E1E1E'"
              (ngModelChange)="backgroundColorValue = $event; onBackgroundColorChange($event)"
            />
          </label>

          <label class="color-control">
            <span class="color-btn">
              <span class="hci">s</span> border
            </span>
            <input
              class="field-input color-text"
              type="text"
              name="tile-border-color-text"
              placeholder="#000000"
              [ngModel]="borderColorValue"
              (ngModelChange)="borderColorValue = $event; onBorderColorChange($event)"
            />
            <input
              class="color-picker"
              type="color"
              name="tile-border-color"
              [ngModel]="borderColorValue || '#000000'"
              (ngModelChange)="borderColorValue = $event; onBorderColorChange($event)"
            />
          </label>
        </div>
      </div>
    </div>

    <footer class="editor-footer">
      <div class="footer-tools">
        <button type="button" class="tool-btn" title="Search Google Images" (click)="searchGoogle()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="7"/>
            <line x1="21" y1="21" x2="15" y2="15"/>
            <text x="10" y="13" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor" stroke="none">AG</text>
          </svg>
        </button>
      </div>
      <div class="footer-actions">
        <button type="button" (click)="cancel()">cancel</button>
        <button type="button" class="primary" (click)="save()">save</button>
      </div>
    </footer>
  </div>
}
