<div
  class="controls-pill"
  [class.faded]="!visible()"
  (mouseenter)="onBarEnter()"
  (mouseleave)="onBarLeave()"
>
  @switch (mode()) {
    @case ('browsing') {
      <!-- nav section (leftmost) -->
      @if (canGoBack() || hasPath()) {
        <div class="controls-section nav">
          @if (canGoBack()) {
            <button class="ctl-btn" (click)="goBack()" aria-label="back">
              <span class="hci">W</span>
            </button>
          }
          @if (hasPath()) {
            <span class="path-crumb">{{ path() }}</span>
          }
        </div>
        <div class="controls-divider"></div>
      }

      <!-- view section -->
      <div class="controls-section view">
        <button class="ctl-btn" [class.active]="locked()" (click)="toggleLock()" aria-label="lock">
          <span class="hci">{{ locked() ? 'n' : 'e' }}</span>
        </button>
        <button class="ctl-btn" (click)="centerView()" aria-label="center">
          <span class="hci">N</span>
        </button>
        <button class="ctl-btn" (click)="zoomOut()" aria-label="zoom out">
          <span class="hci">c</span>
        </button>
        <button class="ctl-btn" (click)="zoomIn()" aria-label="zoom in">
          <span class="hci">d</span>
        </button>
        <button class="ctl-btn" (click)="toggleFullscreen()" aria-label="fullscreen">
          <span class="hci">U</span>
        </button>
      </div>

      <!-- utility section (slides in) -->
      @if (utility()) {
        <div class="controls-divider"></div>
        <div class="controls-section utility">
          <button class="ctl-btn" (click)="cut()" aria-label="cut">
            <span class="hci">T</span>
          </button>
          <button class="ctl-btn" (click)="copy()" aria-label="copy">
            <span class="hci">r</span>
          </button>
          <button class="ctl-btn" (click)="remove()" aria-label="delete">
            <span class="hci">Q</span>
          </button>
          <button class="ctl-btn" (click)="moveItem()" aria-label="move">
            <span class="hci">S</span>
          </button>
          <button class="ctl-btn clipboard-btn" (click)="openClipboard()" aria-label="clipboard">
            <span class="hci">J</span>
            @if (clipboardCount() > 0) {
              <span class="badge">{{ clipboardCount() }}</span>
            }
          </button>
          <button class="ctl-btn" (click)="openSecret()" aria-label="secret">
            <span class="hci">a</span>
          </button>
        </div>
      }

      <!-- utility toggle (rightmost) -->
      <div class="controls-divider"></div>
      <button class="ctl-btn toggle" [class.active]="utility()" (click)="toggleUtility()" aria-label="utility mode">
        <span class="hci">L</span>
      </button>
    }

    @case ('clipboard') {
      <div class="controls-section clipboard-mode">
        <span class="mode-label">clipboard</span>
        @if (clipboardCount() > 0) {
          <span class="clipboard-count">{{ clipboardCount() }}</span>
        } @else {
          <span class="clipboard-empty">empty</span>
        }
      </div>
      <div class="controls-divider"></div>
      <button class="ctl-btn" (click)="clearClipboard()" aria-label="clear clipboard">
        <span class="hci">Q</span>
      </button>
      <button class="ctl-btn" (click)="closeClipboard()" aria-label="close clipboard">
        <span class="close-x">&times;</span>
      </button>
    }

    @case ('secret') {
      <input
        class="secret-input"
        type="text"
        placeholder="enter secret..."
        [value]="secretValue()"
        (input)="onSecretInput($event)"
        (keydown.enter)="submitSecret()"
        (keydown.escape)="closeSecret()"
        #secretInput
      />
      <button class="ctl-btn" (click)="closeSecret()" aria-label="close secret">
        <span class="close-x">&times;</span>
      </button>
    }
  }
</div>
