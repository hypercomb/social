<!-- Progress bar ONLY — no numbers, no text label. The bar itself is the
     indicator: an indeterminate sweep while the frontier is unknown (adopt /
     count-less sync), a determinate fill once a total is announced, and a
     full green bar on completion before it fades. The status text lives in
     the aria-label for screen readers, never on screen. -->
@if (visible()) {
  <div class="sync-cell" [class.done]="done()" role="status" aria-live="polite"
       [attr.aria-label]="(done() ? (doneKind() === 'adopt' ? 'sync.adopted' : 'sync.done') : (adopting() ? 'sync.adopting' : 'sync.synchronizing')) | t">
    <div class="sync-track" [class.indeterminate]="!done() && !hasCounts()">
      <div class="sync-fill" [style.width.%]="done() ? 100 : (hasCounts() ? percent() : null)"></div>
    </div>
  </div>
}
