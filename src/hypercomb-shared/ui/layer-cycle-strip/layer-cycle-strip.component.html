@if (visible()) {
  <div class="layer-cycle-strip" data-consumes-wheel hcWidget="layer-cycle-strip" anchor="bottom">
    @for (entry of entries(); track entry.pubkey) {
      <button
        type="button"
        class="entry"
        [class.active]="entry.active"
        [attr.aria-label]="entry.active ? ('layer-cycle.active' | t) : ('layer-cycle.spotlight' | t)"
        [title]="entry.active ? ('layer-cycle.dismiss' | t) : ''"
        (click)="onEntryClick(entry)">
        <span class="dot" [style.background-color]="entry.color"
                          [style.box-shadow]="entry.active ? '0 0 14px ' + entry.color + ', 0 0 4px ' + entry.color : 'none'"></span>
      </button>
    }
  </div>
}
