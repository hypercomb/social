<div class="header-bar" [class.input-open]="inputOpen()" [style.visibility]="(viewActive() || viewMode() === 'website') ? 'hidden' : null">
  <hc-command-line></hc-command-line>
  <hc-upgrade-indicator></hc-upgrade-indicator>
  <hc-sync-indicator></hc-sync-indicator>
  <hc-mesh-header [meshPublic]="meshPublic()" (meshToggled)="toggleMesh()"></hc-mesh-header>
</div>
<router-outlet />
<!-- Hexagon canvas. The pixi worker reparents this node to <body>
     (position:fixed, z-index:59989, pointer-events:none) at boot, so Angular
     `:host > #pixi-host` CSS can't reach it. Hidden in website mode by the
     global `body.hc-view-website #pixi-host{,canvas}` rule in styles.scss
     (body-descendant selector reaches the reparented node): visibility (NOT
     display:none → 0×0 corrupts zoom) + pointer-events:none on the <canvas>
     (its Pixi pointer-events:auto otherwise eats site clicks at z 59989, above
     the site overlay's 59988). Single source of truth — see styles.scss. -->
<div id="pixi-host" style="z-index: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
<hc-controls-bar [meshPublic]="meshPublic()" (meshToggled)="toggleMesh()" [style.visibility]="viewActive() ? 'hidden' : null"></hc-controls-bar>
<hc-edit-actions [style.visibility]="viewActive() ? 'hidden' : null"></hc-edit-actions>
<!-- Every other shell surface is registry-fed: registered in
     shared/ui/shell-surfaces/shell-surfaces.barrel.ts, mounted here in `order`
     order. Never add an <hc-*> tag below — add a registration to the barrel. -->
<hc-shell-surfaces></hc-shell-surfaces>
