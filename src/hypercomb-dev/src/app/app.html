<div class="header-bar">
  <hc-search-bar></hc-search-bar>
  <!-- <button class="header-toggle" type="button" (click)="toggleOrientation()">{{ orientation() }}</button> -->

  @if (meshPublic()) {
    <div class="mesh-public">
      <button class="shield-toggle" [class.has-secret]="hasSecret()" [style.--shield-color]="shieldColor()" type="button" (click)="onShieldClick()">
        <span class="hci">e</span>
      </button>
      <input
        class="header-secret-input" [class.has-secret]="hasSecret()"
        [type]="secretVisible() ? 'text' : 'password'"
        placeholder="secure your location"
        [value]="secretValue()"
        (input)="onSecretInput($event)"
        (keydown.enter)="submitSecret()"
      />
      <button class="eye-toggle" [class.visible]="secretVisible()" type="button" (click)="onShieldClick()">
        <span class="hci">c</span>
      </button>
      <button class="public-toggle" type="button" (click)="toggleMesh()">
        public
      </button>
    </div>
  } @else {
    <button class="private-toggle" type="button" (click)="toggleMesh()">
      private
    </button>
  }
</div>
<router-outlet />
<div id="pixi-host" style="z-index: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
<hc-controls-bar [meshPublic]="meshPublic()"></hc-controls-bar>
<hc-tile-editor></hc-tile-editor>
