<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hypercomb Development</title>
  <base href="/">

  <!-- Theme pre-paint: reflect the stored theme onto <html> before first paint
       so there's no flash. ThemeService (@hypercomb.social/Theme) owns it
       thereafter. Boots dark when no preference is stored; 'system' clears the
       attribute and follows prefers-color-scheme. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('hc:theme');
        var el = document.documentElement;
        if (t === 'system') el.removeAttribute('data-theme');
        else el.setAttribute('data-theme', t || 'dark');
      } catch (e) {}
    })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Google Fonts: Inter (UI) + Source Serif 4 (display) + JetBrains Mono (chrome) + Material Symbols Outlined (icons) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
</head>
<body>
  <script src="env.js"></script>
  <app-root></app-root>
</body>
</html>
