<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspired by Humans — audiobook</title>
  <meta name="description" content="Listen to the &quot;Inspired by Humans&quot; audiobook — free, no sign-up required.">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Apply persisted theme before paint to avoid flash. Falls
    // through to the prefers-color-scheme rule in styles.css when
    // no choice has been made yet.
    (function () {
      try {
        var stored = localStorage.getItem('ibh:theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (_) { /* private mode — fall back to OS preference */ }
    })();
  </script>
</head>
<body>

  <section class="track-player">
    <div class="track-player__backdrop"></div>

    <div class="track-player__no-signal" id="noSignal" aria-live="polite" aria-label="no signal interlude" hidden>
      <canvas class="track-player__no-signal-noise" id="noSignalCanvas"></canvas>
      <span class="track-player__no-signal-label">no signal</span>
      <button type="button" class="track-player__skip" id="skipNoSignal">play prequel now</button>
    </div>

    <div class="track-player__panel">
      <div class="track-player__header">
        <div class="track-player__eyebrow">hypercomb audio</div>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="toggle theme">
          <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.7 14.5a8 8 0 0 1-11.2-11.2 8 8 0 1 0 11.2 11.2z"></path>
          </svg>
          <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3.6"></circle>
            <path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21M5.6 5.6l1.6 1.6M16.8 16.8l1.6 1.6M5.6 18.4l1.6-1.6M16.8 7.2l1.6-1.6"></path>
          </svg>
        </button>
      </div>
      <h1 class="track-player__title">
        <span class="track-player__title-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 12v-1.5a8 8 0 0 1 16 0V12"></path>
            <rect x="3.5" y="12" width="4" height="7" rx="1.2"></rect>
            <rect x="16.5" y="12" width="4" height="7" rx="1.2"></rect>
          </svg>
        </span>
        <span class="track-player__title-text">&ldquo;Inspired by Humans&rdquo; audiobook</span>
      </h1>
      <p class="track-player__copy">Free to listen. No sign-up required.</p>

      <div class="track-player__status" id="statusLoading">Loading tracks...</div>
      <div class="track-player__status track-player__status--error" id="statusError" hidden></div>
      <div class="track-player__status" id="statusEmpty" hidden>No tracks found.</div>

      <div id="playerContent" hidden>
        <div class="track-player__current">
          <div class="track-player__label">
            <span>Selected track</span>
          </div>
          <div>
            <div class="track-player__track-title" id="selectedTitle"></div>
            <div class="track-player__track-file" id="selectedFile"></div>
          </div>

          <div class="track-player__controls" id="audioPlayer" role="group" aria-label="audio player" tabindex="0">
            <audio id="audio" preload="auto"></audio>
            <button type="button" class="audio-player__play" id="playBtn" aria-label="play">
              <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7.5 4.8v14.4c0 .6.66.97 1.18.66l11.2-6.9a.78.78 0 0 0 0-1.33L8.68 4.73A.78.78 0 0 0 7.5 4.8z"></path>
              </svg>
              <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true" hidden>
                <rect x="7" y="5" width="3.5" height="14" rx="0.8"></rect>
                <rect x="13.5" y="5" width="3.5" height="14" rx="0.8"></rect>
              </svg>
            </button>
            <span class="audio-player__separator" aria-hidden="true"></span>
            <div class="audio-player__scrub" id="scrub" role="slider" aria-label="seek" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
              <div class="audio-player__track">
                <div class="audio-player__buffered" id="bufferedBar"></div>
                <div class="audio-player__progress" id="progressBar"></div>
                <div class="audio-player__thumb" id="thumb"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="track-player__list" id="trackList" role="list" aria-label="Available tracks"></div>
      </div>
    </div>
  </section>

  <script src="player.js"></script>
</body>
</html>
