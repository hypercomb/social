<!-- src/app/home/home.component.html -->
<div class="home">
  <h1>Diamond Core Processor</h1>
  <p class="subtitle">Trusted domains</p>

  <div class="domain-input">
    <input
      type="text"
      placeholder="https://example.com"
      [value]="input()"
      (input)="input.set($any($event.target).value)"
      (keydown.enter)="add()" />
    <button (click)="add()">Add</button>
  </div>

  @if (domains().length) {
    <ul class="domain-list">
      @for (d of domains(); track d) {
        <li>
          <span>{{ d }}</span>
          <button class="remove" (click)="remove(d)">✕</button>
        </li>
      }
    </ul>
  } @else {
    <p class="empty">No domains added yet.</p>
  }

  <hr />

  <button class="primary" type="button" [disabled]="busy()" (click)="createModule()">
    {{ busy() ? 'Creating…' : 'Create new module' }}
  </button>

  <a href="#" (click)="testPost($event)">test postMessage payload → self</a>

  @if (lastSignature()) {
    <p class="subtitle mono">last signature: {{ lastSignature() }}</p>
  }

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
</div>
