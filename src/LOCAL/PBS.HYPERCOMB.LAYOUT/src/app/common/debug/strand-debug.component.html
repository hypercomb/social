<div class="strand-debug">
  <div class="header">
    strands @ {{ state.lineage() }}
  </div>

  <div class="row header-row">
    <span>#</span>
    <span>seed</span>
    <span>op</span>
  </div>

  @for (s of items(); track s.ordinal) {
    <div class="row">
      <span>{{ s.ordinal }}</span>
      <span class="seed">{{ s.seed }}</span>
      <span class="op">{{ s.op }}</span>
    </div>
  }
</div>
