<div
  class="container header"
  [class.mobile]="state.isMobile"
  (mouseover)="onHover(true)"
  (mouseout)="onHover(false)"
>
  <div class="header__content">
    @if (!state.isMobile) {
      <div class="header__left">
        <!-- desktop-only left header content -->
      </div>
    }

    <!-- mobile name only (no view button here anymore) -->
    @if (state.isMobile) {
      <div class="mobile-name">
        <div class="name">{{ caption() }}</div>
      </div>
    }

    @if (!state.isMobile) {
      <div
        id="name"
        [class.hovered]="isHovered"
        (mouseenter)="showEdit = true"
        (mouseleave)="showEdit = false"
        class="header__caption"
      >
        <div (click)="edit($event)">
          @if (!isEditingCaption()) {
            <span>{{ caption() }}</span>
          }
          @if (isEditingCaption()) {
            <input [(ngModel)]="name" placeholder="name" />
          }
        </div>
      </div>
    }

    @if (!state.isMobile) {
      <div class="right-header-area">
        @if (showCount()) {
          <app-tile-count [count]="cellCount()"> </app-tile-count>
        }

        <app-search-box [value]="search.value()" (changed)="search.set($event)">
        </app-search-box>

        <div app-icon-menu></div>
      </div>
    }
  </div>
</div>
