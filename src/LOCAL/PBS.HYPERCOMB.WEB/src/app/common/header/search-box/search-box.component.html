<div class="hc-search">
  <input
    type="text"
    [value]="filter.value()"
    (input)="onInput($event)"
    (focus)="focused($event)"
    (blur)="unfocused($event)"
    [placeholder]="isCreationMode() ? 'Enter new hive name' : 'Search'"
  />

  <button class="action-btn" (click)="onAction()">
    <span class="icon">
      {{ isCreationMode() ? 'U' : 'g' }}
    </span>
  </button>
</div>
