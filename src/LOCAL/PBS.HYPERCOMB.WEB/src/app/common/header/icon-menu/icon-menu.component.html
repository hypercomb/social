<div class="icon-menu">
  <button class="item user" (click)="signIn($event)">
    <span class="icon">{{ userName }}</span>
  </button>

  <button class="item" (click)="viewHelp($event)">
    <span class="icon">g</span>
  </button>

  <button class="item" (click)="togglePreferences($event)">
    <span class="icon">V</span>
  </button>

  @if (isSignedIn) {
    <button class="item" (click)="publish($event)">
      <span class="icon">U</span>
    </button>
  }
</div>
