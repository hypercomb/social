<!-- src/app/intent-inspector/intent-inspector-pro.component.html -->
<div class="outer-container">
  <div class="main-container">
    <header class="topbar">
      <div class="title-stack">
        @if (action(); as a) {
          <div class="intent-title">
            {{ name() }}
          </div>
        } @else {
          <div class="intent-title">loading…</div>
          @if (error()) {
            <div class="intent-subtitle">
              <span class="mono dim">{{ error() }}</span>
            </div>
          }
        }
      </div>
    </header>

    @if (action(); as a) {
      <div class="page-grid">
        <section class="left">
          <!-- static source view only -->
          <hc-code-viewer [code]="classSource()"></hc-code-viewer>
        </section>

        <aside class="right">
          <div class="panel right-tabs">
            <div class="panel-title">safety</div>
            <ul class="list">
              <li>review this code like it is untrusted input</li>
              <li>focus on network calls, data exfiltration, and token/resource access</li>
              <li>verify before confirming</li>
            </ul>
          </div>
        </aside>
      </div>

      <footer class="bottom-buttons">
        <button class="button primary" type="button" [disabled]="!canConfirm()" (click)="confirm()">
          allow script
        </button>

        <button class="button secondary" type="button" (click)="done()">
          done
        </button>
      </footer>
    }
  </div>
</div>
