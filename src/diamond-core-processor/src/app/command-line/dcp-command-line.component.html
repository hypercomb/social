<!-- diamond-core-processor/src/app/command-line/dcp-command-line.component.html -->

<div class="command-bar">
  <div class="command-shell" (mousedown)="onShellMouseDown($event)">
    <div class="command-row">

      <span class="ghost" aria-hidden="true">{{ ghostText() }}</span>

      <input
        #shellInput
        class="command-input"
        type="text"
        name="command-input"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Filter or [select]..."
        (keydown)="onKeyDown($event)"
        (input)="onInput()"
      />

    </div>
  </div>

  @if (showCompletions()) {
    <ul class="command-results" role="listbox">
      @for (s of suggestions(); track s; let i = $index) {
        <li
          role="option"
          [class.active]="i === getActiveIndex()"
          (mousedown)="onSuggestionMouseDown($event, s, i)"
        >
          <span class="typed">{{ typedPart(s) }}</span
          ><span class="rest">{{ restPart(s) }}</span>
        </li>
      }
    </ul>
  }
</div>
