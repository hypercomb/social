<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hypercomb Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Hypercomb — signature-addressed, presence-based, decentralized. The complete reference.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

  <script>
    // Resolve and apply the theme before first paint so the page never flashes
    // the wrong colour. A stored choice wins over the OS preference.
    const HC_THEME_KEY = 'hc-docs-theme'
    const hcScheme = matchMedia('(prefers-color-scheme: dark)')
    const hcResolved = () => localStorage.getItem(HC_THEME_KEY) || (hcScheme.matches ? 'dark' : 'light')
    const hcApply = () => { document.documentElement.dataset.theme = hcResolved() }
    hcScheme.addEventListener('change', () => { if (!localStorage.getItem(HC_THEME_KEY)) hcApply() })
    hcApply()
  </script>

  <style>
    /* ======================================================================
       Hypercomb docs — one cohesive theme, two palettes.
       Honey accent, cold-steel hairlines, editorial reading width.
       ====================================================================== */

    :root {
      /* light — warm paper */
      --bg:           #fcfbf8;
      --bg-elev:      #ffffff;
      --sidebar-bg:   #f6f4ee;
      --text:         #262a30;
      --text-strong:  #14171c;
      --muted:        #6a7280;
      --faint:        #949aa3;
      --border:       #e8e3d7;
      --steel:        rgba(126, 182, 214, .38);
      --accent:       #c6871a;   /* honey */
      --accent-soft:  rgba(198, 135, 26, .14);
      --link:         #9a6200;   /* deep honey — AA on paper */
      --link-hover:   #c6871a;
      --code-bg:      #f2efe6;
      --code-text:    #98590f;
      --code-border:  #e7e1d3;
      --pre-bg:       #1c1f26;   /* code blocks stay dark in both palettes */
      --callout-bg:   rgba(198, 135, 26, .07);
      --selection:    rgba(198, 135, 26, .20);
      --shadow:       0 1px 2px rgba(20, 23, 28, .05), 0 8px 24px rgba(20, 23, 28, .06);
    }

    [data-theme="dark"] {
      /* dark — the hive */
      --bg:           #16181d;
      --bg-elev:      #1b1e24;
      --sidebar-bg:   #1a1d22;
      --text:         #c7cdd5;
      --text-strong:  #eaeef3;
      --muted:        #9aa2ac;
      --faint:        #6b7480;
      --border:       #2a2e36;
      --steel:        rgba(126, 182, 214, .22);
      --accent:       #f5b942;   /* honey */
      --accent-soft:  rgba(245, 185, 66, .13);
      --link:         #f5b942;
      --link-hover:   #ffd07a;
      --code-bg:      #23272e;
      --code-text:    #ffd07a;
      --code-border:  #2f343c;
      --pre-bg:       #1d2026;
      --callout-bg:   rgba(245, 185, 66, .06);
      --selection:    rgba(245, 185, 66, .22);
      --shadow:       0 1px 2px rgba(0, 0, 0, .3), 0 10px 30px rgba(0, 0, 0, .35);
    }

    /* ---- base ---- */
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      letter-spacing: -0.003em;
    }
    ::selection { background: var(--selection); }

    /* thin honey → steel signature line across the very top */
    body::before {
      content: '';
      position: fixed; inset: 0 0 auto 0; height: 2px; z-index: 50;
      background: linear-gradient(90deg, var(--accent), rgba(126, 182, 214, .85) 85%);
    }

    /* scrollbars */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--faint); }

    /* ---- loading ---- */
    #app { color: var(--muted); font-weight: 500; padding: 3rem; }

    /* ---- sidebar ---- */
    .sidebar {
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--border);
    }
    .sidebar > h1 { margin: 1.4rem auto 1rem; }
    .sidebar > h1 .app-name-link {
      color: var(--text-strong);
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.02em;
    }
    .sidebar > h1 .app-name-link::before {
      content: '⬡ ';
      color: var(--accent);
      font-weight: 400;
    }
    /* index.md doubles as the sidebar — hide its prose, keep nav */
    .sidebar-nav > h1,
    .sidebar-nav > p,
    .sidebar-nav > hr { display: none; }
    .sidebar-nav h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .11em;
      color: var(--faint);
      margin: 1.7em 0 .5em;
      padding: 0 16px;
    }
    .sidebar-nav h2::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      margin-right: 8px;
      border-radius: 1px;
      background: var(--steel);
      vertical-align: middle;
    }
    .sidebar ul { margin: 0; }
    .sidebar-nav li { margin: 1px 0; }
    .sidebar-nav li a {
      font-size: 13.5px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      padding: 5px 16px;
      border-left: 2px solid transparent;
      border-radius: 0;
      transition: color .12s ease, background .12s ease, border-color .12s ease;
    }
    .sidebar-nav li a:hover {
      color: var(--text-strong);
      background: var(--accent-soft);
    }
    .sidebar ul li.active > a {
      color: var(--accent);
      font-weight: 600;
      border-left-color: var(--accent);
      background: var(--accent-soft);
    }

    .sidebar-toggle { background-color: transparent; }
    .sidebar-toggle span { background-color: var(--accent); }

    /* ---- search ---- */
    .search { border-bottom: 1px solid var(--border); margin-bottom: 12px; padding: 14px; }
    .search input {
      background: var(--bg-elev);
      color: var(--text-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13.5px;
    }
    .search input:focus { border-color: var(--accent); outline: none; }
    .search input::placeholder { color: var(--faint); }
    .search .clear-button { cursor: pointer; }
    .search .matching-post { border-bottom: 1px solid var(--border); }
    .search p { color: var(--muted); }
    .search h2 { color: var(--text-strong); }
    .search .search-keyword { color: var(--accent); font-style: normal; font-weight: 700; }

    /* ---- content ---- */
    .content { transition: none; }
    .markdown-section {
      max-width: 50rem;
      padding: 2.4rem 2.6rem 6rem;
    }
    .markdown-section p,
    .markdown-section li {
      line-height: 1.72;
      font-size: 16px;
    }
    .markdown-section p { margin: 1em 0; }

    /* headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 { color: var(--text-strong); font-weight: 700; letter-spacing: -0.018em; }
    .markdown-section h1 { font-size: 2.15rem; font-weight: 800; margin: 0 0 .6rem; line-height: 1.15; }
    .markdown-section h2 {
      font-size: 1.5rem;
      margin: 2.6rem 0 1rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid var(--border);
    }
    .markdown-section h3 { font-size: 1.2rem; margin: 2rem 0 .7rem; }
    .markdown-section h4 { font-size: 1.02rem; margin: 1.6rem 0 .5rem; color: var(--text); }
    /* docsify puts heading text in a span inside an anchor */
    .markdown-section .anchor span { color: var(--text-strong); }
    .markdown-section .anchor:hover span { color: var(--accent); }
    /* the page's lead paragraph */
    .markdown-section h1 + p { font-size: 1.075rem; color: var(--muted); line-height: 1.66; }

    /* links */
    .markdown-section a {
      color: var(--link);
      font-weight: 500;
      text-decoration: underline;
      text-decoration-color: color-mix(in srgb, var(--accent) 45%, transparent);
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
      transition: color .12s ease, text-decoration-color .12s ease;
    }
    .markdown-section a:hover {
      color: var(--link-hover);
      text-decoration-color: var(--accent);
    }

    .markdown-section strong { color: var(--text-strong); font-weight: 700; }
    .markdown-section em { color: var(--text); }

    /* lists */
    .markdown-section ul { list-style: none; padding-left: 1.3em; }
    .markdown-section ul > li { position: relative; }
    .markdown-section ul > li::before {
      content: '';
      position: absolute; left: -1.05em; top: .72em;
      width: 5px; height: 5px; border-radius: 1px;
      background: var(--accent);
      opacity: .6;
    }
    .markdown-section ol { padding-left: 1.3em; }
    .markdown-section li { margin: .35em 0; }

    /* inline code */
    .markdown-section code {
      background-color: var(--code-bg);
      color: var(--code-text);
      border: 1px solid var(--code-border);
      border-radius: 5px;
      padding: .12em .4em;
      font-size: .875em;
      font-family: ui-monospace, 'SFMono-Regular', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace;
      word-break: break-word;
    }

    /* code blocks — dark in both palettes */
    .markdown-section pre {
      background-color: var(--pre-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0;
      margin: 1.4em 0;
      box-shadow: var(--shadow);
    }
    .markdown-section pre[data-lang]::after {
      content: attr(data-lang);
      position: absolute; top: 0; right: 0;
      padding: 4px 10px;
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase;
      color: #6b7480;
    }
    .markdown-section pre > code {
      background: transparent;
      border: none;
      color: #d7dde4;
      font-size: 13.5px;
      line-height: 1.6;
      padding: 1.05em 1.2em;
      display: block;
    }

    /* prism tokens — tuned for the dark code surface (used in both palettes) */
    .token.punctuation { color: #8a93a0; }
    .token.operator,
    .token.entity,
    .token.url { color: #c79760; background: none; }
    .token.comment,
    .token.prolog,
    .token.doctype { color: #6b7480; }
    .token.string,
    .token.attr-value,
    .token.char,
    .token.inserted { color: #98cf98; }
    .token.keyword,
    .token.atrule,
    .token.rule { color: #82bbe8; }
    .token.function,
    .token.class-name { color: #f0918d; }
    .token.number,
    .token.boolean,
    .token.constant,
    .token.symbol { color: #e6c07b; }
    .token.property,
    .token.tag,
    .token.attr-name { color: #7fd0c0; }

    .docsify-copy-code-button {
      background: #2a2e36 !important;
      color: #c9cfd6 !important;
      border-radius: 6px !important;
      font-size: 11px !important;
    }
    .docsify-copy-code-button:hover { background: #353b45 !important; }

    /* blockquotes → callouts */
    .markdown-section blockquote {
      background: var(--callout-bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      color: var(--text);
      margin: 1.4em 0;
      padding: .8em 1.2em;
    }
    .markdown-section blockquote p { color: var(--text); margin: .4em 0; }

    /* tables */
    .markdown-section table {
      border-collapse: collapse;
      display: table;
      width: 100%;
      margin: 1.4em 0;
      font-size: 14.5px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .markdown-section th {
      background: var(--sidebar-bg);
      color: var(--text-strong);
      font-weight: 700;
      text-align: left;
    }
    .markdown-section th,
    .markdown-section td { border: 1px solid var(--border); padding: .6em .9em; }
    .markdown-section tr { border: none; background: transparent; }
    .markdown-section tr:nth-child(2n) { background: color-mix(in srgb, var(--sidebar-bg) 55%, transparent); }

    .markdown-section hr { border: none; border-top: 1px solid var(--border); margin: 2.4em 0; }

    /* images & diagrams */
    .markdown-section img,
    .markdown-section svg {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    /* ---- theme toggle ---- */
    .theme-toggle {
      position: fixed; top: 14px; right: 18px; z-index: 60;
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg-elev);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: border-color .15s ease, transform .15s ease, color .15s ease;
    }
    .theme-toggle:hover { border-color: var(--accent); transform: translateY(-1px); }
    .theme-toggle:active { transform: translateY(0); }
    .theme-toggle .moon { display: none; }
    [data-theme="dark"] .theme-toggle .sun { display: none; }
    [data-theme="dark"] .theme-toggle .moon { display: inline; }

    /* ---- responsive ---- */
    @media screen and (max-width: 768px) {
      .markdown-section { padding: 1.6rem 1.2rem 4rem; }
      .theme-toggle { top: 10px; right: 60px; }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark theme" title="Toggle light / dark">
    <svg class="sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
    </svg>
    <svg class="moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </svg>
  </button>

  <div id="app">loading the hive…</div>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'
      localStorage.setItem(HC_THEME_KEY, next)
      hcApply()
      // flush a reflow so every var()-driven colour recomputes immediately
      void document.documentElement.offsetHeight
    })

    window.$docsify = {
      name: 'Hypercomb',
      homepage: 'index.md',
      loadSidebar: 'index.md',
      subMaxLevel: 0,
      auto2top: true,
      maxLevel: 4,
      themeColor: '#c6871a',
      search: {
        placeholder: 'Search the docs',
        noData: 'No matches',
        paths: 'auto',
        depth: 3,
      },
      plugins: [
        // index.md doubles as the sidebar; drop the "— description" tails so
        // each item is just its link.
        (hook) => hook.doneEach(() => {
          document.querySelectorAll('.sidebar-nav li').forEach(li => {
            for (const node of [...li.childNodes]) {
              if (node.nodeName !== 'A' && node.nodeName !== 'UL') node.remove()
            }
          })
        }),
      ],
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
