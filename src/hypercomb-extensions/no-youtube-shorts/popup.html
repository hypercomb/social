<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>No YouTube Shorts</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header><span>▶</span><div><h1>No YouTube Shorts</h1><p>Keep YouTube in long-form mode.</p></div></header>
    <label><span>Block Shorts</span><input id="enabled" type="checkbox" role="switch"></label>
    <p class="note">Hides Shorts shelves and navigation, activates “Show fewer Shorts,” and opens direct Shorts links in the regular player.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
