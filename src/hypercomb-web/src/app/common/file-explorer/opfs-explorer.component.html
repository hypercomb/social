<!-- src/app/common/file-explorer/opfs-explorer.component.html -->

<div class="opfs-explorer">
  <h3 class="title">
    <mat-icon class="title-icon">folder</mat-icon>
    OPFS Explorer
  </h3>

  <div class="toolbar">
    <span class="path">{{ directory() }}</span>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="entries()" class="mat-elevation-z2 opfs-table">

      <!-- icon -->
      <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let e" class="icon-cell">
          <mat-icon>
            {{ e.kind === 'directory' ? 'folder' : 'insert_drive_file' }}
          </mat-icon>
        </td>
      </ng-container>

      <!-- name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let e" class="name-cell">
          {{ e.name }}
        </td>
      </ng-container>

      <!-- run -->
      <ng-container matColumnDef="run">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let e" class="run-cell">
          <button
            mat-icon-button
            type="button"
            (click)="run(e, $event)"
            aria-label="run"
          >
            <mat-icon>play_arrow</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- copy link -->
      <ng-container matColumnDef="copy">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let e" class="copy-cell">
          <button
            mat-button
            type="button"
            class="copy-link"
            (click)="copyDetails(e, $event)"
            aria-label="copy details to clipboard"
          >
            copy
          </button>
        </td>
      </ng-container>

      <!-- delete -->
      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let e" class="delete-cell">
          <button
            mat-icon-button
            type="button"
            color="warn"
            (click)="delete(e, $event)"
            aria-label="delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['icon', 'name', 'run', 'copy', 'delete']"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: ['icon', 'name', 'run', 'copy', 'delete']"
        class="data-row"
        [class.selected-row]="isSelected(row)"
        (click)="explore(row.name)"
      ></tr>

    </table>
  </div>
</div>
