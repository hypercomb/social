@if(showHeader){
<div class="header-bar" [class.input-open]="inputOpen()" [style.visibility]="(viewActive() || viewMode() === 'website') ? 'hidden' : null">
  <app-header></app-header>
  <hc-upgrade-indicator></hc-upgrade-indicator>
  <hc-sync-indicator></hc-sync-indicator>
  <hc-mesh-header [meshPublic]="meshPublic()" (meshToggled)="toggleMesh()"></hc-mesh-header>
</div>
}
<router-outlet></router-outlet>
<!-- Pixi canvas hosts the hexagon surface. The pixi worker REPARENTS this node
     to <body> (position:fixed, z-index:59989, pointer-events:none) at boot, so
     Angular `:host > #pixi-host` CSS can't reach it. It is hidden in website
     mode by the GLOBAL `body.hc-view-website #pixi-host{,canvas}` rule in
     styles.scss — a body-descendant selector DOES reach the reparented node —
     using visibility (NOT display:none, which collapses it to 0×0 and corrupts
     scale/zoom) plus pointer-events:none on the <canvas> (whose Pixi-set
     pointer-events:auto otherwise EATS website clicks at z 59989, one above the
     site overlay's 59988). Single source of truth — see styles.scss. -->
<div id="pixi-host" style="z-index: 0; position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
<hc-controls-bar [meshPublic]="meshPublic()" (meshToggled)="toggleMesh()" [style.visibility]="viewActive() ? 'hidden' : null"></hc-controls-bar>
<hc-edit-actions [style.visibility]="viewActive() ? 'hidden' : null"></hc-edit-actions>
<!-- Every other shell surface is registry-fed: registered in
     shared/ui/shell-surfaces/shell-surfaces.barrel.ts, mounted here in `order`
     order. Never add an <hc-*> tag below — add a registration to the barrel. -->
<hc-shell-surfaces></hc-shell-surfaces>
@if (installNeeded()) {
<div class="install-prompt" role="dialog" aria-modal="true" aria-labelledby="install-title">
  <div class="install-card">
    <h2 id="install-title">{{ 'install.title' | t }}</h2>
    @if (storageBlocked()) {
      <p class="install-blocked">{{ 'install.storage-blocked' | t }}</p>
    } @else {
      <button class="install-cta" type="button" (click)="startWelcome()" [disabled]="upgrading()">
        @if (upgrading()) { {{ 'install.starting' | t }} } @else { {{ 'install.start' | t }} }
      </button>
    }
  </div>
</div>
}
