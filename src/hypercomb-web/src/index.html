<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hypercomb</title>
    <base href="/" />

    <!-- Theme pre-paint: reflect the stored theme onto <html> before first
         paint so there's no flash. ThemeService (@hypercomb.social/Theme) owns
         it thereafter. Boots dark when no preference is stored; 'system' clears
         the attribute and follows prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('hc:theme');
          var el = document.documentElement;
          if (t === 'system') el.removeAttribute('data-theme');
          else el.setAttribute('data-theme', t || 'dark');
        } catch (e) {}
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Google Fonts: Inter (UI) + Material Symbols Outlined (icons) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />

    <!-- Loading-page (genesis splash) styles — in <head> so they survive the
         re-parent out of <app-root> that keeps the splash up until tiles paint. -->
    <style>
      #hc-splash{position:fixed;inset:0;z-index:2147483000;overflow:hidden;background:radial-gradient(120% 90% at 50% 42%,#0c1018 0%,#05060a 60%,#030409 100%)}
      #hc-splash canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
      #hc-splash .m{position:absolute;left:0;right:0;top:calc(66% + 30px);text-align:center;color:#dfe8f0;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:clamp(15px,2.76vw,23px);letter-spacing:.62em;text-indent:.62em;font-weight:600;pointer-events:none;user-select:none}
    </style>
  </head>
  <body>
    <script src="env.js"></script>
    <app-root>
      <!-- Loading page: genesis animation. Paints instantly; splash.js re-parents
           #hc-splash to <body> so it survives bootstrap, then dismisses when the
           first tiles paint. Styles live in <head> so they persist after the move. -->
      <div id="hc-splash" aria-hidden="true">
        <canvas id="hc-splash-cv"></canvas>
        <div class="m">hypercomb</div>
      </div>
      <script src="splash.js"></script>
    </app-root>
  </body>
</html>
