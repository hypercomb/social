       id="filter-top"
       x="-0.1"
       y="-0.3"
       width="1.2"
       height="1.7">
      <feFlood
         result="flood"
         in="SourceGraphic"
         flood-opacity="0.498039"
         flood-color="rgb(0,0,0)"
         id="feFlood1" />
      <feGaussianBlur
         result="blur"
