  <g id="g1">
    <!-- top flat edge: V4(100,0) → V5(300,0) with shadow -->
    <path
       style="fill:#ffd100;fill-opacity:1;fill-rule:evenodd;stroke-width:4.73;filter:url(#filter-top)"
