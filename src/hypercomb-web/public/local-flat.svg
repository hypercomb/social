       id="path-top" />
    <!-- right half: V5(300,0) → V0(400,173) → V1(300,346) bevel at right vertex -->
    <path
       style="fill:#ffd100;fill-opacity:1;fill-rule:evenodd;stroke-width:4.73"
       d="M 293.7,10.74 300.12,0.71 400,173 300.12,345.29 293.7,335.26 387.4,173 Z"
       id="path-right" />
    <!-- bottom flat edge: V1(300,346) → V2(100,346) -->
    <path
       style="fill:#ffd100;fill-opacity:1;fill-rule:evenodd;stroke-width:4.73"
       d="M 293.7,335.26 300.12,345.29 100.12,345.29 106.3,335.26 Z"
       id="path-bottom" />
    <!-- left half: V2(100,346) → V3(0,173) → V4(100,0) bevel at left vertex with shadow -->
    <path
       style="fill:#ffd100;fill-opacity:1;fill-rule:evenodd;stroke-width:4.73;filter:url(#filter-left)"
