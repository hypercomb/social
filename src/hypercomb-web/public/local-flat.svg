         in="blur"
         dx="4.6"
         dy="6.5"
         id="feOffset1" />
      <feComposite
         result="comp1"
         operator="in"
         in="flood"
         in2="offset"
         id="feComp1" />
      <feComposite
         result="comp2"
         operator="over"
         in="SourceGraphic"
         in2="comp1"
         id="feComp2" />
